                  { t: "(E) $\\text{kg} \\cdot \\text{m}^2 \\cdot \\text{s}^{-2}$", why: "誘答：這是能量（焦耳）的因次組合。" }
              ],
              exp: "因次分析的標準流程：把公式移項成常數 = 其他物理量的組合，再逐一以基本單位代入化簡。" },
            { node: "N01", level: "分析", type: "multi", perf: "科學認知（分析）／分析與發現 (pa)",
              q: "利用因次分析檢驗，下列哪些物理量組合的單位與「能量（焦耳）」等價？（多選）",
              opts: [
                  { t: "(A) $hf$（普朗克常數 × 頻率）", c: 1, why: "正確：光量子能量公式，$\\text{J} \\cdot \\text{s} \\times \\text{s}^{-1} = \\text{J}$。" },
                  { t: "(B) $mc^2$（質量 × 光速平方）", c: 1, why: "正確：質能互換公式，$\\text{kg} \\times \\text{m}^2/\\text{s}^2 = \\text{kg} \\cdot \\text{m}^2 \\cdot \\text{s}^{-2} = \\text{J}$。" },
                  { t: "(C) $p/V$（壓力 ÷ 體積）", why: "誘答：壓力要「乘」體積才是能量（$pV$）；除以體積後因次為 $\\text{N} \\cdot \\text{m}^{-5}$，並非能量。" },
                  { t: "(D) $qE$（電荷 × 電場）", why: "誘答：$qE$ 是「靜電力」（牛頓），還要再乘上位移才是能量（$W = qEd$）。" },
                  { t: "(E) $k_B T$（波茲曼常數 × 絕對溫度）", c: 1, why: "正確：分子平均動能與絕對溫度成正比（$\\bar{E}_k \\propto T$），$k_B T$ 具能量的因次（114 學測 Q47 即以 $\\kappa T$ 為能量單位）。" }
              ],
              exp: "此題整合力學、熱學、電磁與量子四個章節的能量公式（114 學測 Q47 命題模式），逐項做因次檢驗即可。" },

            // ========== N02 自然界的尺度與數量級 ==========
            { node: "N02", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "原子直徑的數量級約為多少公尺？",
              opts: [
                  { t: "(A) $10^{-6}$ m", why: "誘答：這是細胞等級的尺度（微米）。" },
                  { t: "(B) $10^{-8}$ m", why: "誘答：接近大分子/病毒下限的尺度，比原子大了約兩個數量級。" },
                  { t: "(C) $10^{-10}$ m", c: 1, why: "正確：原子直徑約 $10^{-10}$ m，即 0.1 nm（1 埃）。" },
                  { t: "(D) $10^{-12}$ m", why: "誘答：介於原子與原子核之間，沒有對應的典型結構。" },
                  { t: "(E) $10^{-15}$ m", why: "誘答：這是「原子核」的尺度（1 fm），比原子小 5 個數量級。" }
              ],
              exp: "兩個必背數字：原子 $10^{-10}$ m、原子核 $10^{-15}$ m。" },
            { node: "N02", level: "理解", type: "single", perf: "科學認知（理解）",
              q: "原子核的直徑約 $10^{-15}$ m，原子的直徑約 $10^{-10}$ m。若把原子放大到直徑 100 公尺的操場，原子核大約相當於下列何者的大小？",
              opts: [
                  { t: "(A) 一座籃球場（約 30 m）", why: "誘答：只縮小約 3 倍，遠遠低估了 5 個數量級的差距。" },
                  { t: "(B) 一輛汽車（約 3 m）", why: "誘答：僅差約 1.5 個數量級，仍大幅高估原子核。" },
                  { t: "(C) 一顆彈珠（約 1 mm）", c: 1, why: "正確：$100 \\text{ m} \\times 10^{-5} = 10^{-3} \\text{ m} = 1 \\text{ mm}$，原子核與原子相差 5 個數量級（十萬倍）。" },
                  { t: "(D) 一粒病毒（約 $10^{-7}$ m）", why: "誘答：縮小過頭；這相當於差了 9 個數量級。" },
                  { t: "(E) 操場的一半（50 m）", why: "誘答：誤以為原子核佔原子的一半大——實際上原子內部幾乎是空的。" }
              ],
              exp: "數量級比較：$10^{-10} / 10^{-15} = 10^5$。原子內部絕大部分是空的，質量卻幾乎集中在極小的原子核——此即拉塞福散射實驗的結論。" },
            { node: "N02", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "已知：原子直徑約 0.1 nm、流感病毒直徑約 100 nm、人類紅血球直徑約 8 μm。三者由小到大的正確排序為何？",
              opts: [
                  { t: "(A) 病毒 ＜ 原子 ＜ 紅血球", why: "誘答：原子（$10^{-10}$ m）遠小於病毒（$10^{-7}$ m），順序顛倒。" },
                  { t: "(B) 原子 ＜ 紅血球 ＜ 病毒", why: "誘答：紅血球（$8 \\times 10^{-6}$ m）比病毒大了近兩個數量級。" },
                  { t: "(C) 原子 ＜ 病毒 ＜ 紅血球", c: 1, why: "正確：$10^{-10} \\text{ m} < 10^{-7} \\text{ m} < 8 \\times 10^{-6} \\text{ m}$。" },
                  { t: "(D) 紅血球 ＜ 病毒 ＜ 原子", why: "誘答：完全反序。" },
                  { t: "(E) 病毒 ＜ 紅血球 ＜ 原子", why: "誘答：誤把原子當最大，可能混淆了「原子」與「細胞」。" }
              ],
              exp: "統一換算成公尺再比較指數：原子 $10^{-10}$、病毒 $10^{-7}$、紅血球約 $10^{-5}$。跨科尺度排序是學測常見題型。" },
            { node: "N02", level: "分析", type: "multi", perf: "科學認知（分析）／批判思辨 (tc)",
              q: "關於尺度與觀測工具的關係，下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) 使用可見光的光學顯微鏡可以直接看見單一原子", why: "誘答：可見光波長約 $10^{-7}$ m，比原子大了三個數量級，受繞射極限限制無法解析原子。" },
                  { t: "(B) 電子顯微鏡解析度較高，是因為電子的物質波波長遠短於可見光", c: 1, why: "正確：$\\lambda = h/p$，高速電子的波長可短至原子等級，繞射極限大幅縮小。" },
                  { t: "(C) 1 奈米等於 $10^{-9}$ 公尺", c: 1, why: "正確：奈米為 $10^{-9}$ m，原子直徑約 0.1 nm。" },
                  { t: "(D) 原子核直徑約為 1 飛米，即 $10^{-15}$ 公尺", c: 1, why: "正確：飛米（fm）＝ $10^{-15}$ m，正是原子核的典型尺度。" },
                  { t: "(E) 尺度每相差一個數量級，代表大小相差 2 倍", why: "誘答：一個數量級是 10 倍，不是 2 倍。" }
              ],
              exp: "「能否看見」取決於觀測波長與物體尺度的比較——此觀念同時連結繞射極限（Ka）與物質波（Kd），是跨節點整合的分析題。" },

            // ========== N03 直線運動與運動圖形 ==========
            { node: "N03", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "在 $v-t$ 圖（縱軸速度、橫軸時間）中，圖線的「斜率」代表哪一個物理量？",
              opts: [
                  { t: "(A) 位移", why: "誘答：位移對應的是圖線與時間軸之間的「面積」，不是斜率。" },
                  { t: "(B) 加速度", c: 1, why: "正確：斜率 $= \\Delta v / \\Delta t$，正是加速度的定義。" },
                  { t: "(C) 平均速率", why: "誘答：平均速率為路徑長除以時間，無法直接從斜率讀出。" },
                  { t: "(D) 合力", why: "誘答：合力 $= ma$ 需要再乘上質量，斜率本身只是加速度。" },
                  { t: "(E) 動能", why: "誘答：動能與 $v^2$ 有關，$v-t$ 圖上沒有直接對應的幾何量。" }
              ],
              exp: "$v-t$ 圖兩大武器：斜率 = 加速度、面積 = 位移。" },
            { node: "N03", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "將球鉛直上拋，球到達最高點的瞬間，下列敘述何者正確？（忽略空氣阻力）",
              opts: [
                  { t: "(A) 速度與加速度皆為零", why: "誘答：速度為零沒錯，但重力從未消失，加速度仍為 $g$。" },
                  { t: "(B) 速度為零，加速度為 $g$、方向向下", c: 1, why: "正確：最高點瞬間 $v = 0$，但球仍受重力，$a = g$ 向下——這正是它隨後往下掉的原因。" },
                  { t: "(C) 速度不為零，加速度為零", why: "誘答：恰好說反了。" },
                  { t: "(D) 速度與加速度皆不為零且方向相同", why: "誘答：最高點瞬間速度確實為零。" },
                  { t: "(E) 加速度方向朝上，因為球剛剛向上運動", why: "誘答：加速度由「合力」決定，不由運動方向決定；全程只受向下的重力。" }
              ],
              exp: "「速度為零 ≠ 加速度為零」：加速度由受力決定。在 $v-t$ 圖上，最高點是圖線穿越時間軸的點，斜率（$-g$）從未改變。" },
            { node: "N03", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "汽車以 $20 \\text{ m/s}$ 等速行駛，駕駛急踩煞車後以大小 $4 \\text{ m/s}^2$ 的等減速度直線滑行至停止。煞車後汽車滑行的距離為多少？",
              opts: [
                  { t: "(A) 25 m", why: "誘答：誤用 $v_0^2 / (2a)$ 時把分母的 2 乘成 4，或把速度先減半。" },
                  { t: "(B) 40 m", why: "誘答：誤用 $\\Delta x = v_0 t$ 且取 $t = 2$ s，忽略了減速過程。" },
                  { t: "(C) 50 m", c: 1, why: "正確：$v^2 = v_0^2 - 2a\\Delta x \\implies 0 = 20^2 - 2(4)\\Delta x \\implies \\Delta x = 400/8 = 50 \\text{ m}$。" },
                  { t: "(D) 80 m", why: "誘答：誤把公式中的 $2a$ 只當成 $a$（$400/5$ 再湊整），漏了係數 2。" },
                  { t: "(E) 100 m", why: "誘答：直接算 $v_0 \\times t = 20 \\times 5$，把停止時間當作 5 秒且全程等速。" }
              ],
              exp: "不含時間的等加速度公式 $v^2 = v_0^2 + 2a\\Delta x$ 最適合「已知初末速求距離」。也可用 $v-t$ 圖面積：三角形 $\\frac{1}{2} \\times 5\\text{ s} \\times 20 \\text{ m/s} = 50$ m。" },
            { node: "N03", level: "分析", type: "short", perf: "科學認知（分析）／分析與發現 (pa)、討論與傳達 (pc)",
              q: "一部電動車沿直線行駛，其運動過程為：$0 \\sim 4$ s 由靜止均勻加速至 $20 \\text{ m/s}$；$4 \\sim 10$ s 維持等速；$10 \\sim 14$ s 均勻減速至靜止。請（1）求出三個階段的加速度；（2）求全程總位移；（3）說明你是根據 $v-t$ 圖的哪些幾何特徵得到答案。<div style=\"text-align: center; margin: 1.25rem 0;\"><svg viewBox=\"0 0 400 220\" width=\"360\" style=\"max-width: 100%; height: auto; background: rgba(255,255,255,0.9); border-radius: 8px; border: 1px solid var(--border-color); padding: 10px;\"><defs><linearGradient id=\"areaGrad\" x1=\"0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\"><stop offset=\"0%\" stop-color=\"var(--primary-blue)\" stop-opacity=\"0.25\"/><stop offset=\"100%\" stop-color=\"var(--primary-blue)\" stop-opacity=\"0.03\"/></linearGradient><marker id=\"arrow\" viewBox=\"0 0 10 10\" refX=\"5\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto-start-reverse\"><path d=\"M 0 0 L 10 5 L 0 10 z\" fill=\"#475569\"/></marker></defs><polygon points=\"50,180 130,60 250,60 330,180\" fill=\"url(#areaGrad)\"/><line x1=\"50\" y1=\"60\" x2=\"250\" y2=\"60\" stroke=\"#94a3b8\" stroke-dasharray=\"3,3\" stroke-width=\"1\"/><line x1=\"130\" y1=\"60\" x2=\"130\" y2=\"180\" stroke=\"#94a3b8\" stroke-dasharray=\"3,3\" stroke-width=\"1\"/><line x1=\"250\" y1=\"60\" x2=\"250\" y2=\"180\" stroke=\"#94a3b8\" stroke-dasharray=\"3,3\" stroke-width=\"1\"/><line x1=\"40\" y1=\"180\" x2=\"370\" y2=\"180\" stroke=\"#475569\" stroke-width=\"1.5\" marker-end=\"url(#arrow)\"/><line x1=\"50\" y1=\"190\" x2=\"50\" y2=\"30\" stroke=\"#475569\" stroke-width=\"1.5\" marker-end=\"url(#arrow)\"/><text x=\"375\" y=\"195\" font-size=\"11\" font-weight=\"600\" fill=\"#475569\">t (s)</text><text x=\"50\" y=\"20\" font-size=\"11\" font-weight=\"600\" fill=\"#475569\" text-anchor=\"middle\">v (m/s)</text><path d=\"M 50 180 L 130 60 L 250 60 L 330 180\" fill=\"none\" stroke=\"var(--primary-blue)\" stroke-width=\"2.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/><circle cx=\"130\" cy=\"60\" r=\"4\" fill=\"var(--primary-blue)\"/><circle cx=\"250\" cy=\"60\" r=\"4\" fill=\"var(--primary-blue)\"/><text x=\"38\" y=\"195\" font-size=\"11\" fill=\"#64748b\" text-anchor=\"end\">0</text><text x=\"130\" y=\"195\" font-size=\"11\" fill=\"#64748b\" text-anchor=\"middle\">4</text><text x=\"250\" y=\"195\" font-size=\"11\" fill=\"#64748b\" text-anchor=\"middle\">10</text><text x=\"330\" y=\"195\" font-size=\"11\" fill=\"#64748b\" text-anchor=\"middle\">14</text><text x=\"38\" y=\"64\" font-size=\"11\" fill=\"#64748b\" text-anchor=\"end\">20</text><text x=\"90\" y=\"145\" font-size=\"11\" fill=\"var(--primary-blue)\" font-weight=\"600\" text-anchor=\"middle\">加速段</text><text x=\"190\" y=\"120\" font-size=\"11\" fill=\"var(--primary-blue)\" font-weight=\"600\" text-anchor=\"middle\">等速段</text><text x=\"290\" y=\"145\" font-size=\"11\" fill=\"var(--primary-blue)\" font-weight=\"600\" text-anchor=\"middle\">減速段</text></svg></div>",
              ans: "（1）第一段 $a_1 = \\frac{20 - 0}{4} = 5 \\text{ m/s}^2$；第二段等速 $a_2 = 0$；第三段 $a_3 = \\frac{0 - 20}{4} = -5 \\text{ m/s}^2$（負號表示與運動方向相反）。（2）位移 = $v-t$ 圖下的面積 = 梯形面積 = $\\frac{1}{2} \\times 4 \\times 20 + 6 \\times 20 + \\frac{1}{2} \\times 4 \\times 20 = 40 + 120 + 40 = 200 \\text{ m}$。（3）加速度取自各段圖線的「斜率」；位移取自圖線與時間軸所夾的「面積」。",
              cer: {
                  c: "由上述證據與推理可知：（1）加速段加速度為 $5 \\text{ m/s}^2$，等速段為 $0$，減速段為 $-5 \\text{ m/s}^2$；（2）全程總位移為 $200 \\text{ m}$；（3）加速度對應 $v-t$ 圖各段的「斜率」，位移對應圖線下方的「面積」。",
                  e: "電動車運動數據：$0 \\sim 4$ s 速度由 $0$ 增至 $20 \\text{ m/s}$；$4 \\sim 10$ s 維持 $20 \\text{ m/s}$；$10 \\sim 14$ s 速度由 $20 \\text{ m/s}$ 降至 $0$。",
                  r: "依據 $v-t$ 圖的幾何意義：<br>① <b>斜率代表加速度</b>：$a_1 = \\frac{20-0}{4-0} = 5 \\text{ m/s}^2$；$a_2 = 0$；$a_3 = \\frac{0-20}{14-10} = -5 \\text{ m/s}^2$（負號表示方向與運動相反）。<br>② <b>面積代表位移</b>：加速段三角形（$\\frac{4 \\times 20}{2}=40$ m）＋等速段矩形（$6 \\times 20=120$ m）＋減速段三角形（$\\frac{4 \\times 20}{2}=40$ m）= $200 \\text{ m}$。"
              },
              pts: [
                  "正確計算三段加速度（$5$、$0$、$-5 \\text{ m/s}^2$），且能說明減速段的負號意義",
                  "以面積法（或分段公式）正確求出總位移 200 m",
                  "明確指出「斜率 = 加速度、面積 = 位移」的圖形對應關係"
              ] },

            // ========== N04 牛頓三大運動定律 ==========
            { node: "N04", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "關於牛頓第一運動定律（慣性定律）的敘述，下列何者正確？",
              opts: [
                  { t: "(A) 物體不受外力（或合力為零）時，必定保持靜止", why: "誘答：只說對一半——原本運動中的物體會保持「等速度直線運動」，不會自動停下。" },
                  { t: "(B) 物體不受外力（或合力為零）時，靜者恆靜、動者維持等速度直線運動", c: 1, why: "正確：慣性定律的完整敘述，涵蓋靜止與等速直線運動兩種情形。" },
                  { t: "(C) 物體運動必須持續有力推動，力消失運動就停止", why: "誘答：這是亞里斯多德的舊觀念，被伽利略斜面實驗推翻。" },
                  { t: "(D) 質量越大的物體慣性越小", why: "誘答：關係相反——質量是慣性大小的量度，質量越大慣性越大。" },
                  { t: "(E) 慣性是一種作用在物體上的力", why: "誘答：慣性是物體「維持原運動狀態的性質」，不是力，受力圖上不能畫出「慣性力」。" }
              ],
              exp: "慣性定律界定了「不受力」時的自然狀態：維持原有速度（包括零速度）。" },
            { node: "N04", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "公車緊急煞車時，站立的乘客會向前傾倒。以物理觀點解釋，下列何者正確？",
              opts: [
                  { t: "(A) 煞車瞬間有一股向前的力推乘客", why: "誘答：找不到施力者的「力」不存在；沒有任何物體向前推乘客。" },
                  { t: "(B) 乘客因慣性傾向維持原有的前進速度，而公車已減速", c: 1, why: "正確：乘客身體依慣性繼續前進，腳底隨車減速，於是身體相對於車向前傾。" },
                  { t: "(C) 地板摩擦力方向向前，把乘客往前推", why: "誘答：煞車時地板給乘客腳底的摩擦力方向是「向後」的（幫乘客減速），不是向前。" },
                  { t: "(D) 乘客的重力在煞車時方向改變", why: "誘答：重力永遠指向地心，與車輛運動狀態無關。" },
                  { t: "(E) 車廂內空氣被壓縮，推動乘客向前", why: "誘答：空氣壓力差在此情境中微不足道，非主因。" }
              ],
              exp: "分析此類題目的關鍵：先問「有沒有真實的施力者」。沒有施力者的「向前的力」是慣性現象的誤讀。" },
            { node: "N04", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "質量 $2$ kg 的物體置於光滑水平面上，同時受到向右 $10$ N 與向左 $4$ N 的水平力。物體的加速度為何？",
              opts: [
                  { t: "(A) $7 \\text{ m/s}^2$，方向向右", why: "誘答：把兩力「相加」（$14/2$）而非求合力，忽略了方向相反。" },
                  { t: "(B) $5 \\text{ m/s}^2$，方向向右", why: "誘答：只用了 $10$ N 除以質量，漏掉向左的 $4$ N。" },
                  { t: "(C) $3 \\text{ m/s}^2$，方向向右", c: 1, why: "正確：合力 $= 10 - 4 = 6$ N（向右），$a = F/m = 6/2 = 3 \\text{ m/s}^2$。" },
                  { t: "(D) $2 \\text{ m/s}^2$，方向向左", why: "誘答：誤把小的力當主導方向，且數值也不對。" },
                  { t: "(E) $12 \\text{ m/s}^2$，方向向右", why: "誘答：把合力 6 N「乘」質量而非除以質量。" }
              ],
              exp: "牛頓第二定律使用的是「合力」：先做向量和，再除以質量。" },
            { node: "N04", level: "分析", type: "multi", perf: "科學認知（分析）／分析與發現 (pa)",
              q: "起重機以繩索吊起重量 $mg$ 的貨物：第一階段等加速上升，第二階段等速上升。下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) 加速上升階段，繩張力 $T > mg$", c: 1, why: "正確：合力需向上，$T - mg = ma > 0$。" },
                  { t: "(B) 等速上升階段，繩張力 $T = mg$", c: 1, why: "正確：等速代表合力為零，張力恰與重力平衡。" },
                  { t: "(C) 等速上升階段，因為物體向上運動，張力仍須大於重力", why: "誘答：混淆「維持運動」與「產生加速度」——等速時合力為零即可，不需要淨力向上。" },
                  { t: "(D) 繩對貨物的拉力與貨物對繩的拉力互為作用力與反作用力，大小恆相等", c: 1, why: "正確：牛頓第三定律，且不論加速或等速皆成立。" },
                  { t: "(E) 貨物所受的重力與繩張力互為作用力與反作用力", why: "誘答：這兩力作用在「同一物體」上，只是可能平衡的兩力；重力的反作用力是貨物吸引地球的力。" }
              ],
              exp: "此為 115 學測 Q11 的完整分析版。判斷作用力/反作用力的鐵則：必屬「同一交互作用、作用在不同物體」。" },

            // ========== N05 摩擦力、彈力與力的平衡 ==========
            { node: "N05", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "在彈性限度內，關於彈簧彈力的虎克定律，下列敘述何者正確？",
              opts: [
                  { t: "(A) 彈力與形變量的平方成正比", why: "誘答：虎克定律是「一次」正比關係 $F = kx$，平方關係出現在彈性位能。" },
                  { t: "(B) 彈力與形變量成正比，方向與形變方向相反", c: 1, why: "正確：$F = kx$，且彈力是「恢復力」，永遠指向恢復原長的方向。" },
                  { t: "(C) 彈力只在拉伸時存在，壓縮時沒有彈力", why: "誘答：壓縮同樣產生恢復力，方向向外推。" },
                  { t: "(D) 彈性常數 $k$ 與彈簧材質無關，是普適常數", why: "誘答：$k$ 由彈簧本身（材質、線徑、圈數）決定，每根彈簧不同。" },
                  { t: "(E) 超過彈性限度後，虎克定律依然成立", why: "誘答：超過彈性限度後形變不可恢復，$F$ 與 $x$ 不再成正比。" }
              ],
              exp: "$F = kx$ 成立的前提是「彈性限度內」；$k$ 越大代表彈簧越「硬」。" },
            { node: "N05", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "重 $50$ N 的木箱靜置於水平地面，受 $5$ N 的水平推力仍保持靜止。此時木箱所受摩擦力的大小為何？（已知最大靜摩擦力為 $15$ N）",
              opts: [
                  { t: "(A) 0 N", why: "誘答：若摩擦力為零，木箱受 5 N 推力就會加速——與「保持靜止」矛盾。" },
                  { t: "(B) 5 N", c: 1, why: "正確：靜摩擦力會「自我調節」，恰與外力平衡，大小等於推力 5 N。" },
                  { t: "(C) 15 N", why: "誘答：15 N 是「最大」靜摩擦力，只在即將滑動的臨界瞬間才達到。" },
                  { t: "(D) 50 N", why: "誘答：把正向力（等於重量）誤當成摩擦力。" },
                  { t: "(E) 無法判斷，需要知道摩擦係數", why: "誘答：靜止狀態下摩擦力由「力平衡」直接決定，根本不需要摩擦係數。" }
              ],
              exp: "未滑動前的靜摩擦力 = 外力（自我調節）；只有臨界滑動時才等於 $\\mu_s N$。這是學測最愛的觀念陷阱。" },
            { node: "N05", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "彈性常數 $k = 200 \\text{ N/m}$ 的輕彈簧鉛直懸掛，下端吊一質量 $1$ kg 的物體後靜止平衡（$g = 10 \\text{ m/s}^2$）。彈簧的伸長量為何？",
              opts: [
                  { t: "(A) 0.5 cm", why: "誘答：計算時多除了一個 10，$10/200 = 0.05$ m 才對。" },
                  { t: "(B) 2 cm", why: "誘答：把 $k$ 誤代為 500，或把質量當成 0.4 kg。" },
                  { t: "(C) 5 cm", c: 1, why: "正確：平衡時 $kx = mg \\implies x = \\frac{1 \\times 10}{200} = 0.05 \\text{ m} = 5$ cm。" },
                  { t: "(D) 20 cm", why: "誘答：誤用 $x = k/mg$ 之類的顛倒公式。" },
                  { t: "(E) 50 cm", why: "誘答：忘記把 $g$ 代入，直接用 $1/200$ 再錯位。" }
              ],
              exp: "靜止平衡 ➔ 彈力與重力平衡 ➔ $kx = mg$。單位換算成公分時小心小數點。" },
            { node: "N05", level: "分析", type: "multi", perf: "科學認知（分析）／分析與發現 (pa)",
              q: "水平地面上的木塊受「由零漸增」的水平拉力，直到開始滑動並持續滑行。下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) 靜止階段，摩擦力隨拉力增大而增大", c: 1, why: "正確：靜摩擦力自我調節，始終與拉力平衡。" },
                  { t: "(B) 靜止階段的摩擦力大小恆等於 $\\mu_s N$", why: "誘答：$\\mu_s N$ 是「最大」靜摩擦力，只在臨界瞬間達到；未達臨界前摩擦力等於拉力。" },
                  { t: "(C) 開始滑動後，摩擦力轉為動摩擦力，通常略小於最大靜摩擦力", c: 1, why: "正確：$f_k < f_{s,\\text{max}}$，這就是「推動的瞬間會突然變輕鬆」的原因。" },
                  { t: "(D) 滑動後的動摩擦力大小與木塊速度成正比", why: "誘答：動摩擦力 $f_k = \\mu_k N$ 與速度無關，是定值。" },
                  { t: "(E) 若在木塊上加放重物，最大靜摩擦力與動摩擦力都會變大", c: 1, why: "正確：兩者皆與正向力 $N$ 成正比，加重使 $N$ 增大。" }
              ],
              exp: "摩擦力三階段模型：靜摩擦（= 外力）→ 最大靜摩擦（臨界）→ 動摩擦（定值）。畫出「摩擦力 vs 拉力」圖即可一目了然。" },

            // ========== N07 克卜勒行星運動定律 ==========
            { node: "N07", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "關於克卜勒第一定律，下列敘述何者正確？",
              opts: [
                  { t: "(A) 行星以太陽為圓心做等速圓周運動", why: "誘答：軌道是「橢圓」不是正圓，且速率並非恆定。" },
                  { t: "(B) 行星軌道為橢圓，太陽位於橢圓的一個焦點上", c: 1, why: "正確：第一定律（軌道定律）的標準敘述。" },
                  { t: "(C) 行星軌道為橢圓，太陽位於橢圓的中心", why: "誘答：太陽在「焦點」不在中心——這是最常見的誘答寫法。" },
                  { t: "(D) 行星與太陽的連線在相同時間內掃過相同的角度", why: "誘答：第二定律掃過的是相同「面積」，不是相同角度。" },
                  { t: "(E) 行星週期與軌道半徑成正比", why: "誘答：第三定律是 $T^2 \\propto r^3$，並非一次正比。" }
              ],
              exp: "三定律關鍵字：橢圓與焦點（一）、等面積（二）、$T^2 \\propto r^3$（三）。" },
            { node: "N07", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "依克卜勒第二定律（等面積定律），行星在「近日點」與「遠日點」的運動速率關係為何？",
              opts: [
                  { t: "(A) 近日點速率較快", c: 1, why: "正確：等時間掃過等面積——距離短時必須跑得快，面積才補得回來。" },
                  { t: "(B) 遠日點速率較快", why: "誘答：直覺誤以為「軌道外側跑得快」，與等面積律相反。" },
                  { t: "(C) 兩處速率相同", why: "誘答：只有正圓軌道才會速率恆定，橢圓軌道速率隨位置改變。" },
                  { t: "(D) 速率快慢取決於行星質量", why: "誘答：等面積律與行星質量無關，任何行星都遵守。" },
                  { t: "(E) 無法比較，需要知道軌道週期", why: "誘答：等面積律本身即可定性比較，不需週期數據。" }
              ],
              exp: "等面積律的本質是角動量守恆（課綱內以「面積速率相等」定性處理）：近日點距離短 ➔ 速率快。" },
            { node: "N07", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "行星 A 與行星 B 繞同一恆星做圓軌道運動，A 的軌道半徑是 B 的 4 倍。則 A 與 B 的公轉週期之比 $T_A : T_B$ 為何？",
              opts: [
                  { t: "(A) 2 : 1", why: "誘答：只取了半徑比的平方根，漏掉三次方。" },
                  { t: "(B) 4 : 1", why: "誘答：誤以為週期與半徑成一次正比。" },
                  { t: "(C) 8 : 1", c: 1, why: "正確：$T^2 \\propto r^3 \\implies T_A/T_B = 4^{3/2} = \\sqrt{64} = 8$。" },
                  { t: "(D) 16 : 1", why: "誘答：誤用 $T \\propto r^2$。" },
                  { t: "(E) 64 : 1", why: "誘答：算出 $T^2$ 的比值 64 後忘記開根號。" }
              ],
              exp: "口訣：「半徑比 → 三次方 → 開根號」。$4^3 = 64$，$\\sqrt{64} = 8$。" },
            { node: "N07", level: "分析", type: "multi", perf: "科學認知（分析）／批判思辨 (tc)",
              q: "關於克卜勒行星運動定律的內涵與科學史地位，下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) $T^2/r^3$ 的比值對繞同一中心天體的所有行星（衛星）都相同", c: 1, why: "正確：該常數只由中心天體質量決定，故繞太陽的行星共用一個常數、繞地球的衛星共用另一個。" },
                  { t: "(B) 克卜勒定律指出行星沿軌道運動的速率恆定不變", why: "誘答：等面積律恰恰說明速率「會變」——近日點快、遠日點慢。" },
                  { t: "(C) 克卜勒定律是由第谷的天文觀測數據歸納而得，先於牛頓的理論解釋", c: 1, why: "正確：先有觀測歸納（克卜勒），後有動力學解釋（牛頓萬有引力），是「數據 → 定律 → 理論」的科學方法典範。" },
                  { t: "(D) 人造衛星繞地球的運動同樣適用克卜勒三定律", c: 1, why: "正確：把中心天體換成地球即可，同步衛星軌道計算正是應用。" },
                  { t: "(E) 克卜勒定律只適用於太陽系，對其他恆星系統不成立", why: "誘答：凡是平方反比引力主導的系統皆適用，系外行星觀測即為證據。" }
              ],
              exp: "本題同時檢驗定律內容與科學本質（觀測歸納 vs 理論演繹）——這正是課綱「認識科學本質」的學習表現。" },

            // ========== N08 萬有引力與重力場 ==========
            { node: "N08", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "關於萬有引力定律 $F = G\\frac{Mm}{r^2}$，下列敘述何者正確？",
              opts: [
                  { t: "(A) 萬有引力有時吸引、有時排斥", why: "誘答：引力永遠是「吸引力」，這是它與靜電力的關鍵差異。" },
                  { t: "(B) 引力大小與兩者距離成反比", why: "誘答：是與「距離平方」成反比，差一個次方會導致比例計算全錯。" },
                  { t: "(C) 任何兩個具有質量的物體之間都存在引力，且與距離平方成反比", c: 1, why: "正確：「萬有」即普遍存在，$F \\propto 1/r^2$。" },
                  { t: "(D) 只有天體之間才有萬有引力，日常物體之間沒有", why: "誘答：日常物體間也有引力，只是 $G$ 極小使其微弱到難以察覺。" },
                  { t: "(E) 地球吸引蘋果的力大於蘋果吸引地球的力", why: "誘答：兩力互為作用力與反作用力，大小必相等（牛頓第三定律）。" }
              ],
              exp: "萬有引力四特徵：普遍存在、恆吸引、平方反比、成對相等。" },
            { node: "N08", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "太空人在繞地球軌道上的太空站內漂浮「失重」。其正確的物理解釋為何？",
              opts: [
                  { t: "(A) 太空站離地球太遠，已經不受地球引力", why: "誘答：在 400 km 高度引力仍約為地表九成；若真無引力，太空站會沿直線飛離，根本無法繞行。" },
                  { t: "(B) 太空站內是真空，所以沒有重力", why: "誘答：真空與否和引力無關，引力是超距作用。" },
                  { t: "(C) 太空站與太空人一起繞地球運動（如同持續自由落體），人對地板沒有壓力，正向力為零", c: 1, why: "正確：「視重為零」的本質——支撐力消失，而非引力消失。" },
                  { t: "(D) 地球引力與月球引力在該處互相抵消", why: "誘答：月球引力在近地軌道處遠小於地球引力，兩者根本不相當。" },
                  { t: "(E) 太空站以極高速運動，產生了反重力", why: "誘答：物理上不存在「反重力」；高速繞行正是引力使太空站維持圓形軌道的結果。" }
              ],
              exp: "失重 = 支撐力（視重）為零，不是引力為零。電梯自由下墜時的失重感是同一模型。" },
            { node: "N08", level: "應用", type: "short", perf: "科學認知（應用）／推理論證 (tr)、計劃與執行 (pe)",
              q: "某行星的質量為地球的 2 倍、半徑也是地球的 2 倍。請以比例法求出該行星表面的重力加速度為地球表面（$g$）的幾倍，並寫出推理過程。",
              ans: "表面重力場強度 $g' = G\\frac{M}{R^2}$。列比例式：$\\frac{g_{\\text{行星}}}{g_{\\text{地}}} = \\frac{M_{\\text{行星}}}{M_{\\text{地}}} \\times \\left(\\frac{R_{\\text{地}}}{R_{\\text{行星}}}\\right)^2 = 2 \\times \\left(\\frac{1}{2}\\right)^2 = 2 \\times \\frac{1}{4} = \\frac{1}{2}$。故該行星表面重力加速度為地球的 $0.5$ 倍，即 $g/2$。",
              cer: {
                  c: "由上述證據與推理可知，該行星表面的重力加速度為地球表面重力加速度（$g$）的 $0.5$ 倍（即 $g/2$）。",
                  e: "已知行星質量 $M_{\\text{行星}} = 2 M_{\\text{地}}$，半徑 $R_{\\text{行星}} = 2 R_{\\text{地}}$。",
                  r: "根據天體表面重力加速度公式 $g = G\\frac{M}{R^2}$，重力加速度與質量 $M$ 成正比、與半徑平方 $R^2$ 成反比。<br>建立比例式：$\\frac{g_{\\text{行星}}}{g_{\\text{地}}} = \\frac{M_{\\text{行星}}}{M_{\\text{地}}} \\times \\left(\\frac{R_{\\text{地}}}{R_{\\text{行星}}}\\right)^2 = 2 \\times \\left(\\frac{1}{2}\\right)^2 = 2 \\times \\frac{1}{4} = \\frac{1}{2}$。<br>故該行星表面重力加速度為地球的 $0.5$ 倍。全程以比例法完成，無需代入 $G$ 的數值。"
              },
              pts: [
                  "正確寫出 $g = GM/R^2$ 或等價的比例關係式",
                  "半徑比取「平方」且置於分母（質量正比、半徑平方反比）",
                  "得到 0.5 倍的正確結論，全程不代入 $G$ 的數值（比例法）"
              ] },
            { node: "N08", level: "分析", type: "multi", perf: "科學認知（分析）／分析與發現 (pa)",
              q: "兩人造衛星甲、乙繞地球做圓軌道運動，甲的軌道半徑較小。下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) 衛星的軌道速率只由中心天體與軌道半徑決定，與衛星本身質量無關", c: 1, why: "正確：軌道運動只取決於地球與軌道大小，和衛星自身質量無關。" },
                  { t: "(B) 軌道越高的乙，速率越快", why: "誘答：軌道越高速率越「慢」（定性：越遠繞得越慢）。" },
                  { t: "(C) 同步衛星必須位於赤道正上方特定高度，週期等於地球自轉週期", c: 1, why: "正確：週期被鎖定為 24 小時，由 $T^2 \\propto r^3$ 反推唯一軌道半徑，且須在赤道面上。" },
                  { t: "(D) 衛星在軌道上運行時不受地球引力作用", why: "誘答：引力一直都在，而且正是它使衛星維持繞行。" },
                  { t: "(E) 軌道半徑較大的乙，公轉週期較長", c: 1, why: "正確：$T^2 \\propto r^3$，半徑大週期長。" }
              ],
              exp: "衛星問題一條主線：引力使衛星維持繞行，再配合克卜勒第三定律 $T^2 \\propto r^3$ 比較 $T$ 與 $r$（速率則以定性判斷：越高越慢）。" },

            // ========== N09 功、動能與位能（機械能守恆） ==========
            { node: "N09", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "關於「功」的定義 $W = F \\cdot \\Delta x$（$F$ 為沿位移方向的力、$\\Delta x$ 為位移），下列敘述何者正確？",
              opts: [
                  { t: "(A) 只要施力，就一定有作功", why: "誘答：若物體沒有位移（$\\Delta x=0$），或力的方向與位移垂直，作功皆為零。" },
                  { t: "(B) 力的方向與運動方向垂直時，該力不作功", c: 1, why: "正確：此時力沿位移方向的分量為零，故不作功。例如做圓周運動時指向圓心的力（與運動方向垂直）、水平移動時的重力，皆不作功。" },
                  { t: "(C) 功是向量，有大小也有方向", why: "誘答：功是「純量」，只有正負（輸入或取出能量）之分。" },
                  { t: "(D) 摩擦力永遠不作功", why: "誘答：動摩擦力對滑動物體作「負功」，把力學能轉為熱。" },
                  { t: "(E) 功的單位是瓦特", why: "誘答：瓦特是「功率」（每秒作功）的單位，功的單位是焦耳。" }
              ],
              exp: "功 = 沿位移方向的力 × 位移，是能量傳輸的量度（純量）。力與運動方向垂直時不作功。" },
            { node: "N09", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "下列哪一種情境中，物體的「力學能（動能＋位能）」保持守恆？",
              opts: [
                  { t: "(A) 木塊沿粗糙斜面下滑", why: "誘答：摩擦力作負功，部分力學能轉為熱，不守恆。" },
                  { t: "(B) 跳傘者張傘後等速下降", why: "誘答：空氣阻力持續作負功；位能減少但動能不變，力學能減少。" },
                  { t: "(C) 小球在光滑軌道上滑行（忽略空氣阻力）", c: 1, why: "正確：只有重力（保守力）作功，動能與位能互換、總和不變。" },
                  { t: "(D) 汽車煞車滑行至停止", why: "誘答：動能全數被摩擦轉為熱。" },
                  { t: "(E) 火箭點火加速上升", why: "誘答：引擎持續對火箭作正功「輸入」能量，力學能增加而非守恆。" }
              ],
              exp: "力學能守恆的判準：除了重力、彈力等保守力外，沒有其他力作功（無摩擦、無外力輸入）。" },
            { node: "N09", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "質量 $2$ kg 的物體自高 $5$ m 處由靜止沿「光滑」斜面下滑（$g = 10 \\text{ m/s}^2$）。抵達底端時的速率為何？",
              opts: [
                  { t: "(A) 5 m/s", why: "誘答：誤用 $v = \\sqrt{gh}$，漏掉係數 2。" },
                  { t: "(B) 10 m/s", c: 1, why: "正確：$mgh = \\frac{1}{2}mv^2 \\implies v = \\sqrt{2gh} = \\sqrt{2 \\times 10 \\times 5} = 10 \\text{ m/s}$，與質量、斜面坡度皆無關。" },
                  { t: "(C) 14 m/s", why: "誘答：誤把 $2gh$ 算成 $200$（多乘一次質量）再開根號。" },
                  { t: "(D) 50 m/s", why: "誘答：直接把 $\\frac{1}{2}v^2 = gh$ 解成 $v = gh$。" },
                  { t: "(E) 需要知道斜面角度才能計算", why: "誘答：光滑斜面上只有重力作功，末速只由「高度差」決定，坡度不影響——這正是能量法的威力。" }
              ],
              exp: "能量法跳過過程細節：$v = \\sqrt{2gh}$。斜面角度只影響「時間」，不影響末速。" },
            { node: "N09", level: "分析", type: "multi", perf: "科學認知（分析）／分析與發現 (pa)",
              q: "木箱沿「粗糙」斜面等速下滑。針對此過程，下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) 木箱的重力位能持續減少", c: 1, why: "正確：高度持續下降，$E_p = mgh$ 減少。" },
                  { t: "(B) 木箱的動能持續增加", why: "誘答：「等速」代表速率不變，動能維持定值。" },
                  { t: "(C) 木箱的力學能持續減少", c: 1, why: "正確：位能減少而動能不變，總力學能下降。" },
                  { t: "(D) 減少的位能全部經摩擦轉換為熱能", c: 1, why: "正確：動能不變，位能的減少量恰等於摩擦生熱（能量守恆總帳）。" },
                  { t: "(E) 此過程仍滿足力學能守恆", why: "誘答：摩擦力作負功，力學能不守恆——守恆的是「總能量」（含熱）。" }
              ],
              exp: "分辨兩個層次：力學能守恆（條件性）vs 總能量守恆（永遠成立）。等速下滑是檢驗這組觀念的經典情境。" },

            // ========== N10 溫度、熱量與熱平衡 ==========
            { node: "N10", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "「比熱」的物理意義為下列何者？",
              opts: [
                  { t: "(A) 使單位質量物質溫度上升 1 K 所需的熱量", c: 1, why: "正確：$Q = ms\\Delta T$ 中的 $s$，單位如 $\\text{J/(kg·K)}$。" },
                  { t: "(B) 物質所含熱量的總和", why: "誘答：物體不「含有」熱量；熱是傳遞中的能量，且比熱是性質不是總量。" },
                  { t: "(C) 物質溫度上升的速率", why: "誘答：升溫速率還取決於供熱功率與質量，不是比熱本身。" },
                  { t: "(D) 使物質完全熔化所需的熱量", why: "誘答：那是「熔化熱」（潛熱），相變時溫度不變，與比熱是不同概念。" },
                  { t: "(E) 物質傳導熱的能力", why: "誘答：那是「熱導率」；比熱大的物質（如水）反而常是不良導熱體。" }
              ],
              exp: "比熱是「升溫的代價」：比熱越大，改變溫度越困難。" },
            { node: "N10", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "將高溫鐵塊投入低溫水中（與外界絕熱），關於熱的流動與平衡，下列敘述何者正確？",
              opts: [
                  { t: "(A) 熱由比熱大的一方流向比熱小的一方", why: "誘答：熱流方向只由「溫度」決定，與比熱無關。" },
                  { t: "(B) 熱由溫度高的鐵塊流向溫度低的水，直到兩者溫度相同", c: 1, why: "正確：熱自發地從高溫流向低溫，熱平衡的定義即是溫度相等。" },
                  { t: "(C) 熱由質量大的一方流向質量小的一方", why: "誘答：質量影響平衡溫度的位置，但不決定熱流方向。" },
                  { t: "(D) 達到平衡時，兩者所含的熱量相等", why: "誘答：平衡時相等的是「溫度」，不是熱量；物體也不「含有」熱量。" },
                  { t: "(E) 達到平衡後，鐵塊溫度仍略高於水溫", why: "誘答：只要仍有溫差，熱就會繼續流動——平衡的終點必是同溫。" }
              ],
              exp: "熱平衡三句話：溫差驅動熱流、方向由高溫到低溫、終點是同溫。" },
            { node: "N10", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "將 $100$ g 的水（比熱 $1 \\text{ cal/(g·°C)}$）從 $20^\\circ\\text{C}$ 加熱到 $80^\\circ\\text{C}$，共需要多少熱量？",
              opts: [
                  { t: "(A) 2000 cal", why: "誘答：誤用 $\\Delta T = 20$，可能把初溫當成溫度變化。" },
                  { t: "(B) 6000 cal", c: 1, why: "正確：$Q = ms\\Delta T = 100 \\times 1 \\times (80 - 20) = 6000$ cal。" },
                  { t: "(C) 8000 cal", why: "誘答：誤用末溫 80 當作 $\\Delta T$，忘了扣初溫。" },
                  { t: "(D) 60 cal", why: "誘答：漏乘質量 100 g。" },
                  { t: "(E) 10000 cal", why: "誘答：把初末溫「相加」（$20+80$）當溫度變化。" }
              ],
              exp: "$Q = ms\\Delta T$ 中 $\\Delta T$ 是「變化量」（末減初）；用攝氏或克氏算差值結果相同。" },
            { node: "N10", level: "分析", type: "multi", perf: "科學認知（分析）／分析與發現 (pa)",
              q: "質量相同的水塊與鐵塊（水的比熱遠大於鐵），下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) 兩者吸收相同熱量時，鐵塊升溫較多", c: 1, why: "正確：$\\Delta T = Q/(ms)$，比熱小的鐵溫度變化大。" },
                  { t: "(B) 兩者吸收相同熱量時，水升溫較多", why: "誘答：與 (A) 相反；水比熱大，升溫反而少。" },
                  { t: "(C) 兩者接觸時，熱必由溫度較高者流向較低者，與比熱大小無關", c: 1, why: "正確：熱流方向只看溫度。" },
                  { t: "(D) 使兩者上升相同溫度，水需要吸收更多熱量", c: 1, why: "正確：$Q = ms\\Delta T$，比熱大的水吃熱多——這正是水適合當冷卻劑、也造成海陸溫差的原因。" },
                  { t: "(E) 比熱較大代表導熱速度較快", why: "誘答：比熱與熱導率是兩回事；水比熱大卻不是好的導熱體。" }
              ],
              exp: "比熱決定「溫度對熱量的敏感度」：沿海氣候溫和、內陸日夜溫差大，皆源自水與砂石的比熱差異。" },

            // ========== N11 氣體分子平均動能與絕對溫度 ==========
            { node: "N11", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "攝氏溫度 $t$ 與絕對溫度（克氏溫標）$T$ 的換算關係為何？",
              opts: [
                  { t: "(A) $T = t - 273$", why: "誘答：加減方向顛倒；$0^\\circ\\text{C} = 273$ K。" },
                  { t: "(B) $T = t + 273$", c: 1, why: "正確：克氏溫標把零點移到絕對零度（$-273^\\circ\\text{C}$）。" },
                  { t: "(C) $T = 273 - t$", why: "誘答：這會使溫度越高 $T$ 越小，明顯矛盾。" },
                  { t: "(D) $T = t \\times 273$", why: "誘答：兩溫標是「平移」關係，不是倍數關係。" },
                  { t: "(E) $T = t / 273$", why: "誘答：同上，混淆平移與比例。" }
              ],
              exp: "絕對零度 $0$ K $= -273^\\circ\\text{C}$，是分子平均動能理論上的最低點。" },
            { node: "N11", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "從微觀角度來看，「絕對溫度」所直接度量的物理量是下列何者？",
              opts: [
                  { t: "(A) 氣體分子的總數目", why: "誘答：分子數與溫度無關，是獨立變數（莫耳數）。" },
                  { t: "(B) 氣體分子無規則運動的平均動能", c: 1, why: "正確：分子平均動能與絕對溫度成正比（$\\bar{E}_k \\propto T$），絕對溫度是分子平均動能的宏觀指標。" },
                  { t: "(C) 氣體所含的總熱量", why: "誘答：物體不「含有」熱量；溫度也不等於能量總量（還與質量有關）。" },
                  { t: "(D) 氣體分子之間的平均距離", why: "誘答：平均距離與密度（體積、分子數）有關，不是溫度的直接意義。" },
                  { t: "(E) 氣體分子的質量", why: "誘答：分子質量由物質種類決定，與溫度無關。" }
              ],
              exp: "溫度的微觀本質：分子動得越劇烈（平均動能越大），溫度越高。同溫下所有理想氣體分子的「平均動能」相同（速率則因質量而異）。" },
            { node: "N11", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "密閉容器內的理想氣體由 $27^\\circ\\text{C}$ 加熱至 $127^\\circ\\text{C}$，氣體分子的平均動能變為原來的幾倍？",
              opts: [
                  { t: "(A) $\\frac{127}{27} \\approx 4.7$ 倍", why: "誘答：直接用攝氏溫度相除——比例計算必須用絕對溫標！" },
                  { t: "(B) $\\frac{400}{300} = \\frac{4}{3}$ 倍", c: 1, why: "正確：換算 $27^\\circ\\text{C} = 300$ K、$127^\\circ\\text{C} = 400$ K，$\\bar{E}_k \\propto T$ 得 $4/3$ 倍。" },
                  { t: "(C) 2 倍", why: "誘答：憑「溫度差 100 度」直覺猜翻倍，未實際換算比值。" },
                  { t: "(D) $\\frac{400}{273} \\approx 1.5$ 倍", why: "誘答：分母誤用 273（把初溫當 $0^\\circ\\text{C}$）。" },
                  { t: "(E) 平均動能不變，只有分子數增加", why: "誘答：密閉容器分子數固定；升溫改變的正是平均動能。" }
              ],
              exp: "涉及「比例」的溫度計算一律先轉克氏溫標：$T(\\text{K}) = t + 273$。" },
            { node: "N11", level: "分析", type: "multi", perf: "科學認知（分析）／分析與發現 (pa)",
              q: "對「密閉且體積固定」的剛性容器內的理想氣體加熱，下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) 分子的平均動能增加", c: 1, why: "正確：$\\bar{E}_k \\propto T$，溫度升高平均動能必增。" },
                  { t: "(B) 分子的平均速率增加", c: 1, why: "正確：分子質量不變而平均動能增加，速率必然變快。" },
                  { t: "(C) 氣體壓力增大", c: 1, why: "正確：分子撞壁更快更頻繁，體積又固定，壓力上升（定容加熱）。" },
                  { t: "(D) 容器內氣體分子的數目增加", why: "誘答：密閉容器分子數固定，加熱不會產生新分子。" },
                  { t: "(E) 因為體積固定，溫度不會改變", why: "誘答：體積固定（不對外作功）時，吸收的熱全部轉為分子內能，溫度照樣上升。" }
              ],
              exp: "微觀圖像串聯：加熱 → 平均動能↑ → 速率↑ → 撞壁力道與頻率↑ → 壓力↑。" },

            // ========== N12 熱力學定律、能量退化與效率 ==========
            { node: "N12", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "下列何者是熱力學第二定律的正確敘述？",
              opts: [
                  { t: "(A) 能量可以憑空產生，也可以憑空消失", why: "誘答：違反能量守恆定律。" },
                  { t: "(B) 熱不會自發地由低溫物體流向高溫物體", c: 1, why: "正確：熱只會自發由高溫流向低溫；冷氣機能反向搬熱是因為「輸入了電能」，並非自發。" },
                  { t: "(C) 熱可以在不引起任何其他變化下完全轉換為功", why: "誘答：熱機必然排出廢熱，熱無法完全轉為功。" },
                  { t: "(D) 只要投入足夠能量，熱機效率可以達到 100%", why: "誘答：熱機必排出廢熱，效率必小於 100%（能量會退化為低品質廢熱）。" },
                  { t: "(E) 能量在轉換過程中不會有任何損耗", why: "誘答：每次能量轉換都會有部分變成低品質廢熱（能量退化），並非毫無損耗。" }
              ],
              exp: "熱力學第二定律給能量轉換定了「方向」：熱只會自發由高溫流向低溫，且熱無法完全轉為功、每次轉換都有廢熱（能量退化）。" },
            { node: "N12", level: "理解", type: "single", perf: "科學認知（理解）",
              q: "「能量退化」指的是下列何種現象？",
              opts: [
                  { t: "(A) 能量總量隨使用逐漸減少", why: "誘答：能量總量永遠守恆，不會減少——退化的是「品質」不是「數量」。" },
                  { t: "(B) 能量每經一次轉換，就有部分變成低溫廢熱，越來越難再利用", c: 1, why: "正確：廢熱是「品質最低」的能量形式，難以再完全轉換為有用的功。" },
                  { t: "(C) 電池放電後電壓下降的現象", why: "誘答：只是化學能耗用的表現，不是能量退化的定義。" },
                  { t: "(D) 位能轉換成動能的過程", why: "誘答：這是正常的能量轉換，力學能之間互換品質不減。" },
                  { t: "(E) 核燃料的放射性隨時間減弱", why: "誘答：那是放射性衰變（半衰期），與能量品質無關。" }
              ],
              exp: "「守恆但退化」：宇宙的能量總量不變，但可用性（品質）隨每次轉換遞減——這就是要節約能源的物理理由。" },
            { node: "N12", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "某火力發電廠每秒輸入化學能 $5 \\times 10^9$ J，輸出電能 $2 \\times 10^9$ J。其能量轉換效率為何？",
              opts: [
                  { t: "(A) 20%", why: "誘答：可能把輸出誤除以輸入加輸出（$2/10$）。" },
                  { t: "(B) 25%", why: "誘答：把輸出除以「廢熱」（$2/8$）之類的錯誤組合。" },
                  { t: "(C) 40%", c: 1, why: "正確：$\\eta = \\frac{2 \\times 10^9}{5 \\times 10^9} = 0.4 = 40\\%$。" },
                  { t: "(D) 60%", why: "誘答：算成「廢熱佔比」（$3/5$）——那是損失率，不是效率。" },
                  { t: "(E) 250%", why: "誘答：分子分母顛倒；效率必小於 100%。" }
              ],
              exp: "效率 = 有效輸出 ÷ 總輸入。剩下的 60%（$3 \\times 10^9$ J）以廢熱排入環境——正是能量退化的體現。" },
            { node: "N12", level: "分析", type: "multi", perf: "科學認知（分析）／批判思辨 (tc)",
              q: "抽蓄水力發電廠在離峰時抽水上山、尖峰時放水發電。下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) 抽水所耗的電能必大於之後發電所得的電能（總效率小於 1）", c: 1, why: "正確：抽水與發電各有損耗，兩級效率相乘必小於 1。" },
                  { t: "(B) 整個過程仍然遵守能量守恆定律", c: 1, why: "正確：損失的能量變成廢熱散逸，總量不變。" },
                  { t: "(C) 抽蓄電廠可以「創造」額外能量以應付尖峰用電", why: "誘答：它是能量的「儲存與調度」設施，不是能量來源——賺的是時間差，不是能量。" },
                  { t: "(D) 抽水與發電的每一次轉換都會產生廢熱", c: 1, why: "正確：馬達、水管摩擦、發電機都有損耗，符合熱力學第二定律。" },
                  { t: "(E) 只要工程技術足夠進步，抽蓄的總效率可以達到 100%", why: "誘答：第二定律限定實際轉換必有損耗，100% 是原理上不可達的極限。" }
              ],
              exp: "儲能設施「以能量換調度彈性」：效率必小於 1 但仍具電網價值。此為生活情境分析題（非考古題）；113 學測考過同屬熱力學應用的電冰箱性能係數（Q24-25）。" },

            // ========== N13 質能互換與核能發電 ==========
            { node: "N13", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "質能互換關係式 $E = \\Delta m c^2$ 中，各符號的意義下列何者正確？",
              opts: [
                  { t: "(A) $c$ 是聲速，約 $340 \\text{ m/s}$", why: "誘答：$c$ 是真空中的「光速」$3 \\times 10^8 \\text{ m/s}$。" },
                  { t: "(B) $\\Delta m$ 是反應前後損失的靜止質量（質量虧損），$c$ 是光速", c: 1, why: "正確：核反應中損失的靜止質量以能量形式釋放。" },
                  { t: "(C) $\\Delta m$ 是燃料燃燒掉的總質量", why: "誘答：化學燃燒的質量幾乎不變；$\\Delta m$ 專指反應前後靜止質量的微小差額。" },
                  { t: "(D) $E$ 是物體的動能", why: "誘答：$E$ 是質量虧損對應釋放的總能量，不限於動能形式。" },
                  { t: "(E) 此公式只適用於核分裂，不適用於核聚變", why: "誘答：分裂與聚變都靠質量虧損釋能，公式通用。" }
              ],
              exp: "質量與能量可互換，匯率是 $c^2 = 9 \\times 10^{16}$——極小質量對應巨大能量。" },
            { node: "N13", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "核能發電廠釋放巨大能量的根本來源為下列何者？",
              opts: [
                  { t: "(A) 鈾燃料棒的燃燒（氧化）反應", why: "誘答：核反應不是燃燒；化學氧化的能量比核反應小了約百萬倍等級。" },
                  { t: "(B) 核分裂反應前後的質量虧損，經 $E = \\Delta mc^2$ 轉換為能量", c: 1, why: "正確：分裂產物的總靜止質量略小於反應前，差額即為釋放的能量。" },
                  { t: "(C) 原子核外電子的能階躍遷", why: "誘答：電子躍遷屬於原子光譜（eV 等級），遠小於核反應（MeV 等級）。" },
                  { t: "(D) 燃料棒與冷卻水摩擦生熱", why: "誘答：摩擦生熱是能量損耗機制，不是核能來源。" },
                  { t: "(E) 質子與電子之間的靜電吸引力", why: "誘答：靜電位能與核反應釋能的機制與數量級都不同。" }
              ],
              exp: "化學反應動的是「電子」，核反應動的是「原子核」——後者的能量尺度大百萬倍，且伴隨可測得的質量虧損。" },
            { node: "N13", level: "應用", type: "short", perf: "科學認知（應用）／推理論證 (tr)、計劃與執行 (pe)",
              q: "某核反應爐每秒釋放 $9 \\times 10^{13}$ J 的能量。已知光速 $c = 3 \\times 10^8 \\text{ m/s}$，請計算反應爐每秒的質量虧損 $\\Delta m$，並對結果的數量級作簡短評論。",
              ans: "由 $E = \\Delta m c^2$ 移項：$\\Delta m = \\frac{E}{c^2} = \\frac{9 \\times 10^{13}}{(3 \\times 10^8)^2} = \\frac{9 \\times 10^{13}}{9 \\times 10^{16}} = 10^{-3} \\text{ kg} = 1 \\text{ g}$。評論：每秒僅損失約 1 公克的質量，就能釋放 $9 \\times 10^{13}$ J（約當數萬家庭一日用電）——因為 $c^2$ 的數量級高達 $10^{16}$-$10^{17}$，微小質量即對應巨大能量。",
              cer: {
                  c: "由上述證據與推理可知，該反應爐每秒的質量虧損為 $10^{-3} \\text{ kg}$（即 $1 \\text{ g}$）。僅損失約 1 公克質量即可釋放龐大能量。",
                  e: "反應爐每秒釋放能量 $E = 9 \\times 10^{13} \\text{ J}$，光速 $c = 3 \\times 10^8 \\text{ m/s}$。",
                  r: "依據愛因斯坦質能互換公式 $E = \\Delta m c^2$，移項得 $\\Delta m = \\frac{E}{c^2}$。<br>代入：$\\Delta m = \\frac{9 \\times 10^{13}}{(3 \\times 10^8)^2} = \\frac{9 \\times 10^{13}}{9 \\times 10^{16}} = 10^{-3} \\text{ kg} = 1 \\text{ g}$。<br>由於 $c^2$ 高達 $9 \\times 10^{16}$ 的數量級，極微小的質量虧損即對應極巨大的能量釋放（約等於數萬家庭一日用電量）。"
              },
              pts: [
                  "正確移項 $\\Delta m = E/c^2$ 並代入 $c^2 = 9 \\times 10^{16}$",
                  "得到 $\\Delta m = 10^{-3}$ kg（1 g）的正確數值與單位",
                  "能評論「質量虧損極小但能量巨大」與 $c^2$ 數量級的關聯"
              ] },
            { node: "N13", level: "分析", type: "multi", perf: "科學認知（分析）／分析與發現 (pa)",
              q: "關於核分裂與核聚變，下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) 兩者都經由質量虧損釋放能量", c: 1, why: "正確：不論重核分裂或輕核聚變，產物總靜止質量都小於反應前。" },
                  { t: "(B) 太陽的能量來自其核心的核聚變反應", c: 1, why: "正確：氫核聚變為氦核，是恆星發光的能量來源。" },
                  { t: "(C) 目前商轉的核能發電廠使用的是核聚變反應", why: "誘答：現行核電廠皆為「核分裂」（鈾-235）；聚變發電仍在研發階段。" },
                  { t: "(D) 核分裂後所有產物的總靜止質量略小於反應前", c: 1, why: "正確：這個差額（質量虧損）正是釋放能量的來源。" },
                  { t: "(E) 核聚變是重原子核分裂成較輕原子核的過程", why: "誘答：說反了——聚變是「輕核結合成較重核」，分裂才是重核裂開。" }
              ],
              exp: "分裂＝重核裂開（核電廠）、聚變＝輕核結合（太陽）；共同點是質量虧損 → $E = \\Delta mc^2$。" },

            // ========== N14 波的性質與波速 ==========
            { node: "N14", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "波速 $v$、頻率 $f$ 與波長 $\\lambda$ 三者的關係為下列何者？",
              opts: [
                  { t: "(A) $v = f / \\lambda$", why: "誘答：除號應為乘號；由「一秒走過 $f$ 個波長」可記住 $v = f\\lambda$。" },
                  { t: "(B) $v = f \\lambda$", c: 1, why: "正確：波每秒振動 $f$ 次、每次前進一個波長 $\\lambda$，故 $v = f\\lambda$。" },
                  { t: "(C) $v = \\lambda / f$", why: "誘答：$\\lambda / f$ 的因次是 $\\text{m} \\cdot \\text{s}$，根本不是速度。" },
                  { t: "(D) $f = v \\lambda$", why: "誘答：移項錯誤，正確為 $f = v/\\lambda$。" },
                  { t: "(E) $\\lambda = v f$", why: "誘答：移項錯誤，正確為 $\\lambda = v/f$。" }
              ],
              exp: "$v = f\\lambda$ 是波動章的樞紐公式，配合「頻率由波源決定、波速由介質決定」使用。" },
            { node: "N14", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "繩波沿水平繩子向右傳播時，繩上某一點的運動情形為下列何者？",
              opts: [
                  { t: "(A) 隨著波一起向右移動", why: "誘答：波傳遞的是「能量與波形」，介質質點不隨波前進——否則繩子早被抽走了。" },
                  { t: "(B) 在原處附近上下振動，不隨波前進", c: 1, why: "正確：橫波的介質質點只在垂直於傳播方向上振動。" },
                  { t: "(C) 靜止不動", why: "誘答：波經過時質點必然振動，否則無法傳遞波形。" },
                  { t: "(D) 沿繩向右移動半個波長後停止", why: "誘答：質點沒有沿傳播方向的淨位移。" },
                  { t: "(E) 以螺旋方式繞繩軸轉動", why: "誘答：平面繩波沒有繞軸運動。" }
              ],
              exp: "「波動傳能不傳質」：質點原地振動，波形與能量前進。" },
            { node: "N14", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "某水波的週期為 $0.5$ s、波長為 $2$ m。此水波的波速為何？",
              opts: [
                  { t: "(A) 1 m/s", why: "誘答：誤用 $v = \\lambda T = 2 \\times 0.5$，把週期當頻率乘。" },
                  { t: "(B) 2 m/s", why: "誘答：只取波長數值，未計入頻率。" },
                  { t: "(C) 4 m/s", c: 1, why: "正確：$f = 1/T = 2$ Hz，$v = f\\lambda = 2 \\times 2 = 4 \\text{ m/s}$。" },
                  { t: "(D) 0.25 m/s", why: "誘答：算成 $T/\\lambda$，公式完全顛倒。" },
                  { t: "(E) 8 m/s", why: "誘答：把週期 0.5 誤當 0.25 或重複乘 2。" }
              ],
              exp: "週期先轉頻率（$f = 1/T$），再套 $v = f\\lambda$。" },
            { node: "N14", level: "分析", type: "multi", perf: "科學認知（分析）／分析與發現 (pa)",
              q: "繩波由細繩傳入粗繩後，波速變慢。下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) 波的頻率保持不變", c: 1, why: "正確：頻率由「波源」決定，跨介質不改變。" },
                  { t: "(B) 波長變短", c: 1, why: "正確：$\\lambda = v/f$，$v$ 變小而 $f$ 不變，波長縮短。" },
                  { t: "(C) 波速是由波源的振動快慢決定的", why: "誘答：波速由「介質」決定；波源決定的是頻率。" },
                  { t: "(D) 波速由介質（繩的粗細、張力）決定", c: 1, why: "正確：同一條繩上，粗細與張力決定波速。" },
                  { t: "(E) 頻率會隨波速變慢而降低", why: "誘答：頻率跨介質不變，變的是波長。" }
              ],
              exp: "跨介質三口訣：頻率不變（隨波源）、波速改變（隨介質）、波長跟著波速變。" },

            // ========== N15 聲波與都卜勒效應 ==========
            { node: "N15", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "關於聲波的基本性質，下列敘述何者正確？",
              opts: [
                  { t: "(A) 聲波是橫波，可在真空中傳播", why: "誘答：兩個都錯——聲波是縱波，且必須依賴介質。" },
                  { t: "(B) 聲波是縱波（疏密波），需要介質才能傳播", c: 1, why: "正確：質點沿傳播方向來回振動形成疏密區，真空中無法傳聲。" },
                  { t: "(C) 聲波在真空中的速率為 $3 \\times 10^8 \\text{ m/s}$", why: "誘答：那是「光」在真空中的速率；聲波在真空中根本無法傳播。" },
                  { t: "(D) 聲音的音調高低由振幅決定", why: "誘答：音調由「頻率」決定，振幅決定的是響度（音量）。" },
                  { t: "(E) 聲波在空氣中的速率比在水中快", why: "誘答：聲速在水中約為空氣中的 4 倍以上（介質越「緊密」傳聲越快）。" }
              ],
              exp: "聲波三性質：縱波、需介質、頻率定音調／振幅定響度。" },
            { node: "N15", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "救護車鳴笛駛近時，路旁的人聽到音調變高。其物理原因為下列何者？",
              opts: [
                  { t: "(A) 波源接近使聲波的傳播速率變快", why: "誘答：聲速只由空氣（介質）決定，與波源運動無關。" },
                  { t: "(B) 波源接近使波前被壓縮，觀察者接收到的波長變短、頻率變高", c: 1, why: "正確：都卜勒效應的機制——前方波前間距被壓縮。" },
                  { t: "(C) 引擎聲的功率變大，音量與音調一起升高", why: "誘答：音量（響度）確實變大，但音調升高是頻率偏移，兩者機制不同。" },
                  { t: "(D) 救護車的鳴笛器發出的頻率真的變高了", why: "誘答：波源本身的發射頻率不變，改變的是「接收到」的頻率。" },
                  { t: "(E) 空氣被救護車推擠而變得比較密", why: "誘答：空氣密度的微小變化不是頻率偏移的主因。" }
              ],
              exp: "都卜勒效應：波源或觀察者的「相對接近/遠離」改變接收頻率；聲速與波源頻率本身皆未變。" },
            { node: "N15", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "超音波血流計以固定頻率向血管發射超音波。當紅血球「迎向」探頭流動時，探頭接收到的反射波頻率如何變化？",
              opts: [
                  { t: "(A) 頻率升高", c: 1, why: "正確：紅血球迎面而來等效於波源接近，反射波頻率上偏；頻率偏移量對應血流速度。" },
                  { t: "(B) 頻率降低", why: "誘答：遠離時才降低；迎向是壓縮波前、頻率升高。" },
                  { t: "(C) 頻率不變，只有振幅改變", why: "誘答：反射體運動必造成都卜勒頻移，這正是血流計的量測原理。" },
                  { t: "(D) 頻率變為零", why: "誘答：頻率為零代表沒有波，物理上不合理。" },
                  { t: "(E) 無法判斷，需知道血液密度", why: "誘答：頻移方向只由「相對運動方向」決定，不需密度資料。" }
              ],
              exp: "112 學測血流計題的核心：只判斷「相對接近或遠離」——接近則高、遠離則低。" },
            { node: "N15", level: "分析", type: "multi", perf: "科學認知（分析）／推理論證 (tr)",
              q: "天文觀測發現多數遙遠星系的光譜線都出現「紅移」。下列推論哪些正確？（多選）",
              opts: [
                  { t: "(A) 紅移表示接收到的波長比原波長更長", c: 1, why: "正確：譜線向紅端（長波長）偏移。" },
                  { t: "(B) 紅移表示這些星系正在遠離我們", c: 1, why: "正確：遠離使接收頻率降低、波長拉長——光的都卜勒效應。" },
                  { t: "(C) 紅移表示光在太空中的速率變慢了", why: "誘答：真空光速恆為 $c$，改變的是頻率與波長，不是速率。" },
                  { t: "(D) 普遍紅移的觀測支持宇宙正在膨脹的模型", c: 1, why: "正確：越遠的星系紅移越大（哈伯定律），是宇宙膨脹的關鍵證據。" },
                  { t: "(E) 紅移表示星系的溫度正在降低", why: "誘答：紅移反映「運動」而非溫度；溫度影響的是光譜的強度分布。" }
              ],
              exp: "從「譜線偏移」到「宇宙膨脹」是跨尺度的推理論證鏈：紅移 → 遠離 → 距離越遠退行越快 → 膨脹宇宙。" },

            // ========== N16 光的反射與折射 ==========
            { node: "N16", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "光的反射定律內容為下列何者？",
              opts: [
                  { t: "(A) 反射角大於入射角", why: "誘答：反射角永遠「等於」入射角，與介質無關。" },
                  { t: "(B) 入射角等於反射角，且入射線、反射線與法線在同一平面上", c: 1, why: "正確：反射定律的完整敘述（角度皆從法線起算）。" },
                  { t: "(C) 反射角等於入射角，但只在光滑鏡面才成立", why: "誘答：粗糙面的「漫射」中每條光線仍各自遵守反射定律，只是表面法線方向不一。" },
                  { t: "(D) 入射角與反射角互餘", why: "誘答：兩角相等，不是相加 90°；互餘是誤把角度從界面量起造成的混淆。" },
                  { t: "(E) 反射光的頻率會減半", why: "誘答：反射不改變頻率（顏色不變）。" }
              ],
              exp: "反射定律兩要件：共面、等角（皆對法線量測）。" },
            { node: "N16", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "光從空氣斜射進入水中時折射線「偏向法線」。其根本原因為下列何者？",
              opts: [
                  { t: "(A) 光在水中的傳播速率比在空氣中慢", c: 1, why: "正確：由快介質進入慢介質，波前偏轉使折射角小於入射角（偏向法線）。" },
                  { t: "(B) 光在水中的頻率變低", why: "誘答：跨介質頻率不變；改變的是波速與波長。" },
                  { t: "(C) 水的密度比空氣大，把光「壓」向法線", why: "誘答：「密度壓光」不是物理機制；關鍵變數是波速，不是密度本身。" },
                  { t: "(D) 光在水中發生了都卜勒效應", why: "誘答：都卜勒效應需要相對運動，與折射無關。" },
                  { t: "(E) 水面吸收了部分光能", why: "誘答：吸收影響亮度，不影響行進方向。" }
              ],
              exp: "折射方向的判準只有一個：波速變慢 → 偏向法線；波速變快 → 偏離法線。" },
            { node: "N16", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "光線從水中以 $30^\\circ$ 入射角斜射向水面进入空氣（光在空氣中較快）。關於折射線，下列敘述何者正確？",
              opts: [
                  { t: "(A) 折射角大於 $30^\\circ$，折射線偏離法線，且頻率不變", c: 1, why: "正確：由慢入快 → 偏離法線（折射角變大）；頻率跨介質恆不變。" },
                  { t: "(B) 折射角小於 $30^\\circ$，折射線偏向法線", why: "誘答：方向判斷反了——那是「由快入慢」（如空氣入水）的情形。" },
                  { t: "(C) 折射角等於 $30^\\circ$，沿原方向直進", why: "誘答：只有「垂直入射」（入射角 0°）才不偏折。" },
                  { t: "(D) 折射角大於 $30^\\circ$，且頻率變高", why: "誘答：方向對了，但頻率跨介質不會改變。" },
                  { t: "(E) 必定發生全反射，沒有折射線", why: "誘答：全反射需要入射角「大於臨界角」；30° 未必達到，不能一概而論。" }
              ],
              exp: "115 學測 Q49 手繪題的判準：由慢入快 → 偏離法線。全反射只在超過臨界角時發生。" },
            { node: "N16", level: "分析", type: "multi", perf: "科學認知（分析）／分析與發現 (pa)",
              q: "波（含光波）跨越介質界面折射時，下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) 頻率保持不變", c: 1, why: "正確：頻率由波源決定，界面兩側振動節奏必須連續一致。" },
                  { t: "(B) 波長會改變", c: 1, why: "正確：$\\lambda = v/f$，波速變而頻率不變，波長必隨之改變。" },
                  { t: "(C) 波速會改變", c: 1, why: "正確：波速由介質決定，跨介質即改變——這正是折射發生的根源。" },
                  { t: "(D) 由慢介質進入快介質時，折射線偏向法線", why: "誘答：方向說反——由慢入快是「偏離」法線（折射角變大）。" },
                  { t: "(E) 光進入水中後顏色（頻率）會改變", why: "誘答：頻率不變故顏色不變；水中看起來變化是亮度與方向，不是色相。" }
              ],
              exp: "折射的不變量是頻率、改變量是波速與波長；方向偏折由波速變化方向唯一決定。" },

            // ========== N17 干涉、繞射與光的波動性 ==========
            { node: "N17", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "楊氏雙狹縫實驗中，螢幕上出現「亮紋」的條件為下列何者？",
              opts: [
                  { t: "(A) 兩狹縫到該點的波程差為半波長的奇數倍", why: "誘答：那是「暗紋」（反相相消）的條件。" },
                  { t: "(B) 兩狹縫到該點的波程差為波長的整數倍", c: 1, why: "正確：波程差 $= n\\lambda$ 時兩波同相疊加，建設性干涉成亮紋。" },
                  { t: "(C) 兩波的振幅恰好相等", why: "誘答：振幅相等只影響亮暗對比，不是亮紋位置的條件。" },
                  { t: "(D) 該點恰好位於兩狹縫的正中間", why: "誘答：中央亮紋只是 $n=0$ 的特例，其他亮紋同樣存在。" },
                  { t: "(E) 光的強度足夠強", why: "誘答：干涉條紋位置與光強無關，單光子累積也會形成條紋。" }
              ],
              exp: "亮紋：波程差 $n\\lambda$（同相）；暗紋：$(n+\\frac{1}{2})\\lambda$（反相）。" },
            { node: "N17", level: "理解", type: "single", perf: "科學認知（理解）／批判思辨 (tc)",
              q: "為什麼雙狹縫干涉實驗被視為「光具有波動性」的決定性證據？",
              opts: [
                  { t: "(A) 因為實驗顯示光沿直線前進", why: "誘答：直線前進恰是「微粒說」也能解釋的現象，非波動獨有。" },
                  { t: "(B) 因為出現亮暗相間的條紋，尤其「暗紋」代表光＋光可以相消，只有波的疊加能解釋", c: 1, why: "正確：微粒說無法解釋兩束光疊加反而變暗；相消干涉是波動的專屬特徵。" },
                  { t: "(C) 因為光通過狹縫後速度變慢", why: "誘答：狹縫不改變光速，也與波動性判定無關。" },
                  { t: "(D) 因為光會被狹縫邊緣吸收", why: "誘答：吸收只影響亮度，不產生規律條紋。" },
                  { t: "(E) 因為兩道光互相碰撞而散開", why: "誘答：光子之間不會像粒子那樣碰撞散射成條紋；條紋是相位疊加的結果。" }
              ],
              exp: "判定波動性的關鍵證據是「相消」：兩束光疊加出暗紋，粒子模型完全無法交代。" },
            { node: "N17", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "雙狹縫實驗中，某點到兩狹縫的波程差恰為 $1.5\\lambda$。該點呈現亮紋還是暗紋？",
              opts: [
                  { t: "(A) 亮紋，因為 1.5 是整數的一半", why: "誘答：亮紋需要「整數」倍波長；1.5 不是整數。" },
                  { t: "(B) 暗紋，因為波程差為半波長的奇數倍（$3 \\times \\frac{\\lambda}{2}$），兩波反相相消", c: 1, why: "正確：$1.5\\lambda = (1 + \\frac{1}{2})\\lambda$，波峰對波谷，破壞性干涉。" },
                  { t: "(C) 亮紋，因為波程差大於一個波長", why: "誘答：大小不重要，重要的是「差幾分之幾個波長」的相位關係。" },
                  { t: "(D) 不亮不暗的均勻灰色", why: "誘答：完全反相且振幅相近時會近乎全暗，不是灰色均勻帶。" },
                  { t: "(E) 無法判斷，需知道狹縫間距", why: "誘答：波程差已直接給出，相位關係即可判定，不需其他幾何資料。" }
              ],
              exp: "判斷流程：波程差 ÷ 波長 → 整數為亮紋、整數加一半為暗紋。" },
            { node: "N17", level: "分析", type: "short", perf: "科學認知（分析）／分析與發現 (pa)、討論與傳達 (pc)",
              q: "在雙狹縫干涉實驗中：（1）請說明螢幕上亮紋與暗紋各自形成的物理條件；（2）若把光源從綠光換成波長較長的紅光（其他條件不變），條紋間距會如何變化？請說明理由。",
              ans: "（1）亮紋：兩狹縫到達該點的波程差為波長的整數倍（$\\Delta = n\\lambda$），兩波同相、波峰對波峰疊加（建設性干涉）；暗紋：波程差為半波長的奇數倍（$\\Delta = (n+\\frac{1}{2})\\lambda$），兩波反相、波峰對波谷相消（破壞性干涉）。（2）條紋間距會「變寬」。理由：相鄰亮紋對應的波程差相差一個波長，波長 $\\lambda$ 變長時，需要更大的位置偏移才能累積出一個波長的波程差，故條紋間距與波長成正比（$\\Delta y \\propto \\lambda$），紅光（$\\lambda$ 較長）條紋較疏。",
              cer: {
                  c: "由上述證據與推理可知：（1）亮紋由建設性干涉（波程差為 $n\\lambda$）形成；暗紋由破壞性干涉（波程差為 $(n+\\frac{1}{2})\\lambda$）形成。（2）光源換成紅光後，干涉條紋間距會「變寬」。",
                  e: "光源由綠光更換為紅光，波長 $\\lambda$ 變長（$\\lambda_{\\text{紅}} > \\lambda_{\\text{綠}}$），而狹縫間距 $d$ 與屏幕距離 $L$ 不變。",
                  r: "① <b>亮暗紋條件</b>：亮紋出現在兩狹縫光波同相相加處（波程差為波長的整數倍 $n\\lambda$，波峰對波峰疊加——建設性干涉）；暗紋出現在兩波反相抵消處（波程差為半波長的奇數倍，波峰對波谷——破壞性干涉）。<br>② <b>條紋間距與波長</b>：相鄰亮紋對應的波程差相差「一個波長」。波長 $\\lambda$ 越長，需要更大的位置偏移才能累積出一個波長的波程差，故條紋間距隨波長增大而變寬。紅光波長較長，條紋較疏。"
              },
              pts: [
                  "正確寫出亮紋（$n\\lambda$、同相加強）與暗紋（$(n+\\frac{1}{2})\\lambda$、反相相消）條件",
                  "指出換紅光後條紋間距「變寬」",
                  "以「條紋間距與波長成正比」或波程差累積的幾何理由完成論證"
              ] },

            // ========== N18 電磁波與電磁波譜 ==========
            { node: "N18", level: "記憶", type: "single", perf: "科學認知（記憶）",

              opts: [
                  { t: "(A) 微波 → 無線電波 → 可見光 → 紫外線", why: "誘答：無線電波的頻率比微波更低，前兩項順序顛倒。" },
                  { t: "(B) 無線電波 → 紅外線 → 可見光 → X 射線", c: 1, why: "正確：完整順序為無線電波→微波→紅外線→可見光→紫外線→X 射線→γ 射線。" },
                  { t: "(C) 紅外線 → 微波 → 紫外線 → 可見光", why: "誘答：微波頻率低於紅外線，且紫外線高於可見光——兩處皆錯。" },
                  { t: "(D) X 射線 → 紫外線 → 可見光 → 無線電波", why: "誘答：這是由「高到低」的順序，方向相反。" },
                  { t: "(E) 可見光 → 紅外線 → 紫外線 → 微波", why: "誘答：紅外線頻率低於可見光，排序錯亂。" }
              ],
              exp: "口訣（頻率低→高）：無線電、微波、紅外、可見（紅→紫）、紫外、X、γ。" },
            { node: "N18", level: "理解", type: "single", perf: "科學認知（理解）",
              q: "無線電波與 X 射線在「真空中」的傳播速率關係為何？",
              opts: [
                  { t: "(A) X 射線較快，因為頻率較高", why: "誘答：頻率影響的是光子能量，不是真空中的速率。" },
                  { t: "(B) 無線電波較快，因為波長較長", why: "誘答：波長同樣不影響真空中的速率。" },

                  { t: "(D) 視發射源的功率而定", why: "誘答：功率影響強度（振幅），與速率無關。" },

              ],
              exp: "電磁波家族的共同身分證：真空中皆以 $c$ 前進；差別只在頻率（能量）與波長。" },
            { node: "N18", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "地面天文台主要以「可見光」與「無線電波」波段觀測宇宙，而紅外線與 X 射線觀測多仰賴太空望遠鏡。其原因為下列何者？",
              opts: [
                  { t: "(A) 可見光與無線電波能穿透大氣層（大氣窗），紅外線與 X 射線大多被大氣吸收", c: 1, why: "正確：水氣與二氧化碳吸收紅外線、高層大氣吸收 X 射線與紫外線，只有特定波段能到達地面。" },
                  { t: "(B) 宇宙中只發射可見光與無線電波", why: "誘答：天體輻射涵蓋整個電磁波譜，X 射線源、紅外源都很豐富。" },
                  { t: "(C) 紅外線與 X 射線速度太快，地面儀器來不及接收", why: "誘答：所有電磁波真空同速，接收快慢不是問題。" },
                  { t: "(D) 地磁場會把紅外線與 X 射線偏折掉", why: "誘答：電磁波不帶電，磁場不會使其偏折（帶電粒子才會）。" },
                  { t: "(E) 太空望遠鏡的鏡片比較大", why: "誘答：口徑與繞射極限有關，但無法解釋「特定波段必須上太空」。" }
              ],
              exp: "「大氣窗」概念：大氣對不同頻段的吸收率不同，決定了地面/太空望遠鏡的分工——物理與地科的整合考點。" },
            { node: "N18", level: "分析", type: "multi", perf: "科學認知（分析）／分析與發現 (pa)",
              q: "關於電磁波的性質與應用，下列敘述哪些正確？（多選）",
              opts: [

                  { t: "(B) 微波是一種機械波，需要空氣才能傳播", why: "誘答：微波是電磁波，可在真空傳播——衛星通訊正是明證。" },
                  { t: "(C) 電磁波可以在真空中傳播", c: 1, why: "正確：電磁波由變化的電磁場自我維持，不需介質。" },
                  { t: "(D) 波長越長的電磁波，單一光子能量越大", why: "誘答：關係相反——$E = hf = hc/\\lambda$，波長越長能量越小。" },
                  { t: "(E) X 射線穿透力強，可用於醫學造影", c: 1, why: "正確：高頻高能的 X 射線可穿透軟組織，由骨骼吸收差異成像。" }
              ],
              exp: "把「頻率↑ = 能量↑ = 波長↓」這條軸帶著走，電磁波譜的所有比較題都能解。" },

            // ========== N19 靜電與庫侖定律 ==========
            { node: "N19", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "關於兩點電荷間的庫侖靜電力，下列敘述何者正確？",
              opts: [
                  { t: "(A) 與兩電荷距離成反比", why: "誘答：是與「距離平方」成反比；一次反比會導致比例計算錯誤。" },
                  { t: "(B) 與兩電荷電量的乘積成正比，與距離平方成反比", c: 1, why: "正確：$F = k\\frac{q_1 q_2}{r^2}$，同性相斥、異性相吸。" },
                  { t: "(C) 只有吸引力，沒有排斥力", why: "誘答：那是萬有引力的特性；靜電力同性相斥、異性相吸。" },
                  { t: "(D) 與兩電荷電量的和成正比", why: "誘答：是「乘積」不是「和」。" },
                  { t: "(E) 與距離的三次方成反比", why: "誘答：平方反比才是正確形式，與萬有引力同形。" }
              ],
              exp: "庫侖定律與萬有引力同為平方反比，但靜電力可斥可吸、強度遠大於重力。" },
            { node: "N19", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "帶電量 $+4Q$ 的甲球與帶電量 $+Q$ 的乙球相隔一段距離。甲對乙的靜電力大小為 $F_1$、乙對甲的靜電力大小為 $F_2$，兩者關係為何？",
              opts: [
                  { t: "(A) $F_1 = 4F_2$，因為甲的電量是乙的 4 倍", why: "誘答：直覺陷阱——兩力是同一交互作用的一對作用力與反作用力，必相等。" },
                  { t: "(B) $F_1 = F_2$，兩力互為作用力與反作用力", c: 1, why: "正確：牛頓第三定律；公式中 $q_1 q_2$ 的乘積也對兩球一視同仁。" },
                  { t: "(C) $F_2 = 4F_1$，小電荷受力較大", why: "誘答：與 (A) 同型的顛倒誤解。" },
                  { t: "(D) 無法比較，需要知道兩球質量", why: "誘答：質量影響「加速度」，不影響「受力大小」。" },
                  { t: "(E) $F_1 = 2F_2$", why: "誘答：無物理依據的折衷選項。" }
              ],
              exp: "受力相等（牛三），但輕的、電量小的球「加速度」較大——力與加速度要分開討論。" },
            { node: "N19", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "兩點電荷間的靜電力原為 $F$。若兩者距離增為原來的 3 倍（電量不變），靜電力變為多少？",
              opts: [
                  { t: "(A) $F/3$", why: "誘答：誤用一次反比；庫侖定律是平方反比。" },
                  { t: "(B) $F/6$", why: "誘答：把 3 倍距離誤乘 2 再倒數，無物理依據。" },
                  { t: "(C) $F/9$", c: 1, why: "正確：$F \\propto 1/r^2$，距離 3 倍 → 力變 $1/3^2 = 1/9$。" },
                  { t: "(D) $3F$", why: "誘答：方向顛倒——距離變遠力應變小。" },
                  { t: "(E) $9F$", why: "誘答：平方對了但方向反了。" }
              ],
              exp: "平方反比速算：距離 $n$ 倍 → 力 $1/n^2$ 倍。與重力場 $g$ 的比例題同一套路。" },
            { node: "N19", level: "分析", type: "multi", perf: "科學認知（分析）／批判思辨 (tc)",
              q: "比較「靜電力」與「萬有引力」，下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) 兩者皆遵守平方反比定律", c: 1, why: "正確：$F \\propto 1/r^2$ 是兩者共同的數學形式。" },
                  { t: "(B) 重力恆為吸引力，靜電力可吸引也可排斥", c: 1, why: "正確：質量沒有「負值」，電荷有正負兩種。" },
                  { t: "(C) 在原子尺度下，重力遠強於靜電力", why: "誘答：恰恰相反——質子與電子間的靜電力比重力強約 $10^{39}$ 倍。" },
                  { t: "(D) 原子中電子與原子核的束縛主要靠靜電力", c: 1, why: "正確：庫侖吸引力是原子結構的主宰力。" },
                  { t: "(E) 兩者都是短程力，超出原子尺度即消失", why: "誘答：兩者皆為「長程力」（作用範圍無限遠）；短程力是強力與弱力。" }
              ],
              exp: "同形式（平方反比）、不同性格（可斥 vs 恆吸、強 vs 極弱）——這組對比是基本交互作用章節的前哨站。" },

            // ========== N20 電流磁效應 ==========
            { node: "N20", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "「電流的磁效應」是由哪位科學家發現？其實驗現象為何？",
              opts: [
                  { t: "(A) 法拉第；磁鐵插入線圈產生電流", why: "誘答：那是「電磁感應」（磁生電），時序在後。" },
                  { t: "(B) 厄斯特；通電導線使附近的磁針發生偏轉", c: 1, why: "正確：1820 年厄斯特發現電流產生磁場——電與磁的第一座橋梁。" },
                  { t: "(C) 馬克士威；以方程式統一電磁理論", why: "誘答：馬克士威是理論統合者，不是電流磁效應的發現者。" },
                  { t: "(D) 赫茲；以實驗證實電磁波存在", why: "誘答：赫茲驗證的是電磁波，非電流磁效應。" },
                  { t: "(E) 庫侖；以扭秤測量電荷間的作用力", why: "誘答：庫侖研究的是靜電力定律。" }
              ],
              exp: "科學史鏈：厄斯特（電生磁）→ 法拉第（磁生電）→ 馬克士威（統合）→ 赫茲（驗證）。" },
            { node: "N20", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "將導線繞成螺線管並通以電流，就成為「電磁鐵」。其原理為下列何者？",
              opts: [
                  { t: "(A) 導線本身是磁性材料，繞圈後磁性增強", why: "誘答：銅線本身無磁性；磁場來自「電流」而非材質。" },
                  { t: "(B) 每一圈電流產生的磁場方向一致疊加，形成類似棒形磁鐵的磁場", c: 1, why: "正確：多匝線圈的磁場同向疊加，兩端形成 N、S 極；加鐵芯可再增強。" },
                  { t: "(C) 電流使導線溫度升高而產生磁性", why: "誘答：熱與磁性無關，高溫反而會破壞磁性材料的磁性。" },
                  { t: "(D) 電子在導線中互相摩擦產生磁場", why: "誘答：「摩擦生磁」不是物理機制；運動電荷（電流）本身就產生磁場。" },
                  { t: "(E) 螺線管內的空氣被磁化", why: "誘答：空氣幾乎不可磁化；磁場直接源自電流。" }
              ],
              exp: "電磁鐵的三個調控鈕：電流大小、線圈匝數、鐵芯——皆源自「電流生磁、同向疊加」。" },
            { node: "N20", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "一長直導線通有向北的電流，導線正下方的磁針受電流磁場影響而偏轉。若將電流方向改為向南，磁針偏轉方向會如何？",
              opts: [
                  { t: "(A) 偏轉方向不變", why: "誘答：磁場方向隨電流反向而反轉，偏轉必然改變。" },
                  { t: "(B) 偏轉方向相反", c: 1, why: "正確：由安培右手定則，電流反向則周圍磁場整體反向，磁針往相反方向偏。" },
                  { t: "(C) 磁針停止偏轉", why: "誘答：只要有電流就有磁場，磁針仍會偏轉。" },
                  { t: "(D) 磁針旋轉 90 度後靜止，與電流方向平行", why: "誘答：磁針順磁場方向排列，而導線周圍磁場為「環形」，不會與電流平行。" },
                  { t: "(E) 磁針被導線吸引貼上去", why: "誘答：磁場對磁針施「力矩」使其轉向，不是單純吸附。" }
              ],
              exp: "右手定則：拇指指電流、四指環繞即磁場方向。電流反向 → 磁場反向 → 偏轉反向。" },
            { node: "N20", level: "分析", type: "multi", perf: "科學認知（分析）／分析與發現 (pa)",
              q: "關於電流與磁場的關係，下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) 靜止的電荷會在周圍產生磁場", why: "誘答：靜止電荷只產生「電場」；要產生磁場必須是「運動」的電荷（電流）。" },
                  { t: "(B) 運動的電荷（電流）會在周圍產生磁場", c: 1, why: "正確：電流磁效應的核心——磁場源自運動電荷。" },
                  { t: "(C) 電磁鐵的磁力大小可經由調整電流大小來控制", c: 1, why: "正確：電流越大磁場越強，且斷電即失磁——這是電磁鐵優於永久磁鐵之處。" },
                  { t: "(D) 電動機（馬達）利用磁場對載流線圈的作用力使線圈轉動", c: 1, why: "正確：通電線圈在磁場中受力偶轉動，電能轉為力學能。" },
                  { t: "(E) 電流磁效應由法拉第首先發現", why: "誘答：是厄斯特；法拉第發現的是反向的「電磁感應」。" }
              ],
              exp: "把「電生磁（厄斯特/馬達）」與「磁生電（法拉第/發電機）」成對記憶，方向恰好相反。" },

            // ========== N21 電磁感應與冷次定律 ==========
            { node: "N21", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "根據法拉第電磁感應定律，線圈中產生感應電流的條件為下列何者？",
              opts: [
                  { t: "(A) 線圈附近存在強大的靜止磁鐵", why: "誘答：磁場再強，只要穿過線圈的磁場「不變」，就沒有感應電流。" },
                  { t: "(B) 穿過線圈的磁場發生「變化」", c: 1, why: "正確：關鍵在「變化」二字——增加或減少都會感應出電流。" },
                  { t: "(C) 線圈必須通有外加電流", why: "誘答：感應電流不需外加電源，這正是發電機的原理。" },
                  { t: "(D) 線圈溫度夠高", why: "誘答：溫度與電磁感應無關。" },
                  { t: "(E) 線圈放置在真空中", why: "誘答：介質不是條件，穿過線圈的磁場變化才是。" }
              ],
              exp: "電磁感應一句話：穿過線圈的磁場變、感應電流生；不變就沒有。" },
            { node: "N21", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "悠遊卡沒有電池，靠近讀卡機時卻能供電給卡內晶片完成感應。其原理為下列何者？",
              opts: [
                  { t: "(A) 讀卡機以紅外線傳輸電力給卡片", why: "誘答：紅外線用於遙控訊號傳輸，功率與機制皆不符。" },
                  { t: "(B) 讀卡機線圈的交流電產生變化磁場，使卡片內線圈的磁場改變而感應出電流", c: 1, why: "正確：法拉第電磁感應——變化磁場隔空在卡片線圈中感應電流供電（111 學測 Q6 即以「晶片卡」為情境考此模型）。" },
                  { t: "(C) 卡片內有微型太陽能板，吸收讀卡機的光", why: "誘答：卡片在口袋中也能感應，光電機制不成立。" },
                  { t: "(D) 讀卡機以靜電吸引卡片內的電荷形成電流", why: "誘答：靜電感應無法持續供電，也與線圈結構無關。" },
                  { t: "(E) 卡片與讀卡機直接以金屬接點導電", why: "誘答：悠遊卡是「非接觸式」感應卡，無外露接點。" }
              ],
              exp: "「沒有電池＋線圈＋靠近就作用」＝電磁感應供電模型；手機無線充電同理。" },
            { node: "N21", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "將磁鐵的 N 極朝下、由上方接近水平放置的閉合線圈。根據冷次定律，線圈中感應電流所產生的磁場，在線圈上方呈現的磁極為何？",
              opts: [
                  { t: "(A) N 極，以排斥接近中的磁鐵", c: 1, why: "正確：穿過線圈的磁場增加，感應電流的磁場必「阻礙」變化——面對來者以同極相拒。" },
                  { t: "(B) S 極，以吸引磁鐵加速落下", why: "誘答：這會「幫助」穿過線圈的磁場增加，違反冷次定律（也違反能量守恆）。" },
                  { t: "(C) 不產生任何磁場", why: "誘答：穿過線圈的磁場正在變化，必有感應電流與伴隨磁場。" },
                  { t: "(D) 交替出現 N 極與 S 極", why: "誘答：磁鐵單向接近時穿過線圈的磁場單調增加，感應方向不會來回翻轉。" },
                  { t: "(E) 方向取決於線圈的電阻大小", why: "誘答：電阻影響電流「大小」，不影響「方向」；方向由冷次定律決定。" }
              ],
              exp: "冷次定律口訣：「來拒去留」——接近時排斥（同極相對）、遠離時挽留（異極相對）。" },
            { node: "N21", level: "分析", type: "short", perf: "科學認知（分析）／分析與發現 (pa)、討論與傳達 (pc)",
              q: "磁鐵 N 極朝下，自線圈正上方由靜止自由落下並穿過線圈。請描述感應電流隨時間變化（$I-t$ 圖）的三個關鍵特徵，並以冷次定律與穿過線圈的磁場變化說明理由。",
              ans: "特徵一：磁鐵接近與穿出時，感應電流「方向相反」——接近時穿過線圈的磁場增加，感應電流阻礙增加；穿出時穿過線圈的磁場減少，感應電流反向以阻礙減少。特徵二：磁鐵位於線圈正中央的瞬間，穿過線圈的磁場達極大值、變化率為零，故感應電流為「零」。特徵三：因重力加速，穿出時磁鐵速度比進入時快，穿過線圈的磁場變化率更大，故「穿出段的電流峰值較高、持續時間較短」（$I-t$ 圖不對稱）。此外由冷次定律，線圈對磁鐵的磁力全程都在阻礙其運動：接近時排斥、離開時吸引。",
              cer: {
                  c: "由上述證據與推理可知，磁鐵穿過線圈的 $I-t$ 圖特徵為：① 接近線圈與穿出線圈時，感應電流方向相反；② 磁鐵恰位於線圈正中央的瞬間，感應電流值為零；③ 穿出階段的電流峰值比進入階段高，且持續時間較短。",
                  e: "磁鐵受重力作用由靜止向下做加速度運動。接近時為 N 極接近線圈；穿出時為 S 極離開線圈。",
                  r: "物理原理分析如下：<br>① <b>接近與穿出反向</b>：接近時，穿過線圈向下的磁場增強，由<b>冷次定律</b>，感應電流須產生向上的磁場以阻礙其增強；穿出時，穿過線圈向下的磁場減弱，感應電流須產生向下的磁場以阻礙其減弱。兩階段磁場方向相反，感應電流方向必然相反。<br>② <b>中央電流為零</b>：當磁鐵位於線圈正中央時，穿過線圈的磁場達到最強，此瞬間磁場「暫時不再變化」，故沒有感應電流。<br>③ <b>穿出峰值較高且時間較短</b>：因磁鐵下落時持續受重力加速，穿出時的速度明顯大於進入時的速度。速度越快，磁場變化越劇烈，感應電流峰值越高；且磁鐵通過線圈的總時間變短，故穿出段電流「峰值較高、持續時間較短」。"
              },
              pts: [
                  "指出進入與穿出時電流方向相反，並以穿過線圈的磁場增/減與冷次定律說明",
                  "指出中央瞬間電流為零（穿過線圈的磁場極大、變化率為零）",
                  "指出穿出段峰值較大、時間較短，並歸因於重力加速使變化率增大"
              ] },

            // ========== N22 家庭用電與用電安全 ==========
            { node: "N22", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "家庭中各電器（電燈、電視、冰箱）的連接方式為下列何者？",
              opts: [
                  { t: "(A) 串聯，以節省電線", why: "誘答：串聯會使一個電器故障即全戶斷電，且各電器分不到額定電壓。" },
                  { t: "(B) 並聯，各電器獨立獲得相同的電源電壓", c: 1, why: "正確：並聯讓每個電器都得到 110V 額定電壓，且可獨立開關。" },
                  { t: "(C) 一半串聯、一半並聯", why: "誘答：家用插座迴路一律並聯。" },
                  { t: "(D) 串聯與並聯交替使用，視季節而定", why: "誘答：接線方式是固定的電路設計，不隨季節改變。" },
                  { t: "(E) 以無線方式供電，沒有固定連接", why: "誘答：家庭配電為有線並聯電路。" }
              ],
              exp: "並聯兩優點：電壓相同（額定運作）、獨立開關（互不影響）。" },
            { node: "N22", level: "理解", type: "single", perf: "科學認知（理解）",
              q: "廚房同時開啟多個大功率電器時，無熔絲開關「跳電」。其直接原因為下列何者？",
              opts: [
                  { t: "(A) 插座電壓下降到安全值以下", why: "誘答：並聯下電壓幾乎維持定值；跳電與電壓下降無關。" },
                  { t: "(B) 並聯支路增多使主幹線總電流超過安全上限", c: 1, why: "正確：$I_{\\text{total}} = \\sum P_i / V$ 累加超載，開關跳脫以防導線過熱起火。" },
                  { t: "(C) 電器串聯使總電阻增大", why: "誘答：家用電器是並聯；且電阻增大反而使電流變小。" },
                  { t: "(D) 電流太快撞壞開關", why: "誘答：「電流速度」不是物理量概念；跳脫是電流「大小」超限。" },
                  { t: "(E) 多台電器的磁場互相干擾", why: "誘答：磁場干擾與過載保護無關。" }
              ],
              exp: "跳電保護的是「導線」：電流過大 → 導線發熱（$P = I^2R$）→ 火災風險，開關先行切斷。" },
            { node: "N22", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)、計劃與執行 (pe)",
              q: "某 110V 插座迴路裝有 20A 的無熔絲開關。同時使用吹風機（1200W）、電熱水瓶（800W）與微波爐（1100W）時，迴路是否會跳電？",
              opts: [
                  { t: "(A) 不會，因為總功率 3100 W 未超過此迴路的功率上限", why: "誘答：此迴路的功率上限為 $P = IV = 20 \\times 110 = 2200$ W，3100 W 早已超標。" },
                  { t: "(B) 會，因為總電流 $I = 3100/110 \\approx 28$ A，超過 20 A 上限", c: 1, why: "正確：$I_{\\text{total}} = P_{\\text{total}}/V = (1200+800+1100)/110 \\approx 28.2$ A ＞ 20 A，開關跳脫。" },
                  { t: "(C) 不會，因為三個電器輪流用電", why: "誘答：「同時使用」時電流即時累加，不會自動輪流。" },
                  { t: "(D) 會，因為電壓超過 110V", why: "誘答：電壓維持 110V 不變；超標的是電流。" },
                  { t: "(E) 不會，因為每個電器的電流都小於 20 A", why: "誘答：單一電器雖各自過關，但主幹線承受的是「總和」。" }
              ],
              exp: "檢核流程：總功率 → 總電流（$I = P/V$）→ 與開關額定值比較。3100W ÷ 110V ≈ 28A ＞ 20A。" },
            { node: "N22", level: "分析", type: "multi", perf: "科學認知（分析）／批判思辨 (tc)",
              q: "關於家庭用電與安全，下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) 並聯電路中，每個電器兩端的電壓都相同", c: 1, why: "正確：並聯的定義特徵，各支路共用同一電壓。" },
                  { t: "(B) 開啟的電器越多，等效總電阻越小、總電流越大", c: 1, why: "正確：並聯支路增加使等效電阻下降，總電流隨之上升。" },
                  { t: "(C) 無熔絲開關（或保險絲）應串聯在主幹線上，才能監控總電流", c: 1, why: "正確：串聯位置才能讓全部電流通過保護裝置。" },
                  { t: "(D) 跳電的原因是「電壓」超過負載上限", why: "誘答：跳脫條件是「電流」超限；電壓在並聯系統中維持定值。" },
                  { t: "(E) 用同一條延長線同時供應多個高功率電器較為安全", why: "誘答：延長線導線較細、額定電流低，集中大功率反而是常見火災原因。" }
              ],
              exp: "安全思維：保護裝置串聯監控「總電流」、大功率電器分散插座、延長線不接高功率——全部源自並聯電流累加模型。" },

            // ========== N23 光電效應與光量子論 ==========
            { node: "N23", level: "記憶", type: "single", perf: "科學認知（記憶）",
              q: "愛因斯坦光電效應方程 $hf = W + E_{k,\\text{max}}$ 中，$W$ 代表的物理量為何？",
              opts: [
                  { t: "(A) 光照射金屬所作的總功", why: "誘答：$W$ 是「單一電子」脫離金屬所需的最小能量，不是總量。" },
                  { t: "(B) 金屬的功函數（電子脫離金屬表面所需的最小能量）", c: 1, why: "正確：功函數由金屬種類決定，對應底限頻率 $f_0 = W/h$。" },
                  { t: "(C) 光電子的平均動能", why: "誘答：式中的動能項是 $E_{k,\\text{max}}$（最大動能），且與 $W$ 是不同項。" },
                  { t: "(D) 光子的動量", why: "誘答：動量因次與能量不同，無法出現在此能量守恆式中。" },
                  { t: "(E) 電流通過金屬產生的熱", why: "誘答：光電效應方程是「單一光子對單一電子」的能量帳，與電流生熱無關。" }
              ],
              exp: "一顆光子的能量分兩份：先付「脫離費」$W$，剩下的變成光電子動能。" },
            { node: "N23", level: "理解", type: "single", perf: "科學認知（理解）／建立模型 (tm)",
              q: "光電效應實驗中，增強入射光的「強度」（頻率不變、且頻率已高於底限頻率），觀察到的結果為何？",
              opts: [
                  { t: "(A) 光電子的最大動能增大", why: "誘答：最大動能只由「頻率」決定（$E_k = hf - W$），與強度無關。" },
                  { t: "(B) 光電子的數目增多（光電流增大），但最大動能不變", c: 1, why: "正確：強度增大代表光子「數量」變多，打出的電子也變多，但每顆光子能量不變。" },
                  { t: "(C) 底限頻率降低", why: "誘答：底限頻率由金屬功函數決定，與光強無關。" },
                  { t: "(D) 沒有任何改變", why: "誘答：光電流確實會增大——「數量」有變，變的不是動能。" },
                  { t: "(E) 光電子速度加倍", why: "誘答：速度由最大動能決定，而動能不隨強度改變。" }
              ],
              exp: "光量子記帳法：頻率管「單價」（每顆光子能量）、強度管「數量」（光子數）。" },
            { node: "N23", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",
              q: "以光子能量 $5$ eV 的紫外光照射功函數 $W = 2$ eV 的金屬表面。射出光電子的最大動能為何？",
              opts: [
                  { t: "(A) 2 eV", why: "誘答：這是功函數本身，不是剩餘的動能。" },
                  { t: "(B) 2.5 eV", why: "誘答：把 5 eV 除以 2，誤用比例思維。" },
                  { t: "(C) 3 eV", c: 1, why: "正確：$E_{k,\\text{max}} = hf - W = 5 - 2 = 3$ eV。" },
                  { t: "(D) 5 eV", why: "誘答：忘記扣除脫離金屬所需的功函數。" },
                  { t: "(E) 7 eV", why: "誘答：把功函數「加」上去——能量帳方向錯誤。" }
              ],
              exp: "光電效應的能量帳永遠是減法：最大動能 = 光子能量 − 功函數。" },
            { node: "N23", level: "分析", type: "multi", perf: "科學認知（分析）／批判思辨 (tc)",
              q: "關於光電效應實驗及其意義，下列敘述哪些正確？（多選）",
              opts: [
                  { t: "(A) 入射光頻率低於底限頻率時，無論光強多大、照射多久，都沒有光電子射出", c: 1, why: "正確：單一光子能量不足就打不出電子，能量無法靠時間或數量累積。" },
                  { t: "(B) 光電子的最大動能與入射光頻率呈線性關係", c: 1, why: "正確：$E_{k,\\text{max}} = hf - W$，斜率即普朗克常數 $h$。" },
                  { t: "(C) 增強光強度可增大光電流", c: 1, why: "正確：光子數增多，單位時間打出的光電子數增多。" },
                  { t: "(D) 光電效應可以用光的波動說完整解釋", why: "誘答：波動說預測能量可累積、任何頻率皆可打出電子——與實驗矛盾，正因此才需要光量子論。" },
                  { t: "(E) 底限頻率對所有金屬都相同", why: "誘答：底限頻率 $f_0 = W/h$ 隨金屬功函數而異，每種金屬不同。" }
              ],
              exp: "光電效應三大「反波動說」證據：底限頻率存在、動能與強度無關、瞬時發射——確立光的粒子性。" },

                  { t: "(E) 因為溫度不夠高，光譜才不連續", why: "誘答：線光譜是量子化的本質特徵，再高溫的稀薄氣體光譜仍是線狀。" }

            { node: "N24", level: "應用", type: "short", perf: "科學認知（應用）／推理論證 (tr)、計劃與執行 (pe)",
              q: "某原子由能量 $-1.5$ eV 的能階躍遷至 $-3.98$ eV 的能階，放出一個光子。已知 $hc \\approx 1240 \\text{ eV} \\cdot \\text{nm}$，請計算此光子的波長，並判斷它屬於可見光、紫外線或紅外線。",
              ans: "能階差 $\\Delta E = E_{\\text{high}} - E_{\\text{low}} = (-1.5) - (-3.98) = 2.48 \\text{ eV}$。光子波長 $\\lambda = \\frac{hc}{\\Delta E} = \\frac{1240}{2.48} = 500 \\text{ nm}$。可見光範圍約 400–700 nm，故此光子屬於「可見光」（約為綠光）。",

                  e: "原子由高能階 $E_{\\text{high}} = -1.5 \\text{ eV}$ 躍遷至低能階 $E_{\\text{low}} = -3.98 \\text{ eV}$；$hc \\approx 1240 \\text{ eV} \\cdot \\text{nm}$。",
                  r: "① <b>能階差計算</b>：根據玻爾能階模型，光子能量 $\\Delta E = E_{\\text{high}} - E_{\\text{low}} = (-1.5) - (-3.98) = 2.48 \\text{ eV}$。<br>② <b>波長求值</b>：$\\lambda = \\frac{hc}{\\Delta E} = \\frac{1240}{2.48} = 500 \\text{ nm}$。<br>③ <b>波段歸屬</b>：可見光範圍約 $400 \\sim 700 \\text{ nm}$，$500 \\text{ nm}$ 落於此區間，故為可見光。"

            { node: "N25", level: "應用", type: "single", perf: "科學認知（應用）／推理論證 (tr)",

            { node: "N25", level: "分析", type: "multi", perf: "科學認知（分析）／分析與發現 (pa)",

            // ========== N26 放射性衰變與核反應 ==========

              opts: [

                  { t: "(B) 中子經 $\\beta$ 衰變轉變為質子——弱交互作用", c: 1, why: "正確：$\\beta$ 衰變（改變粒子種類）正是弱力的招牌工作。" },

              ],
              exp: "配對心法：核結合＝強力、衰變＝弱力、天體＝重力、其餘（化學/接觸/光）＝電磁力。" },
            { node: "N27", level: "分析", type: "multi", perf: "科學認知（分析）／分析與發現 (pa)",
              q: "關於四大基本交互作用的特性，下列敘述哪些正確？（多選）",
              opts: [

                  { t: "(C) 電磁力是長程力，作用範圍無限遠", c: 1, why: "正確：與重力同為 $1/r^2$ 長程力，媒介粒子為光子。" },
                  { t: "(D) 弱交互作用負責把夸克束縛在質子內", why: "誘答：束縛夸克的是「強力」（膠子）；弱力負責衰變。" },
                  { t: "(E) 重力只作用於帶電荷的物體之間", why: "誘答：重力作用於「一切具有質量（能量）」的物體，與電荷無關。" }

              exp: "四力各司其職：強力築核、電磁力築物質與光、弱力司衰變、重力築宇宙結構。" },

        // ===== 題庫作答互動 =====
        const BANK_LV_ORDER = { '記憶': 1, '理解': 2, '應用': 3, '分析': 4 };
        const BANK_LV_CLS = { '記憶': 's', '理解': 'i', '應用': 'o', '分析': 'l' };
        const BANK_TYPE_LABEL = { single: '單選題（五選一）', multi: '多選題', short: '簡答題' };

        const bankIndex = {};  // uid -> question object
        const bankSel = {};    // uid -> Set of selected option indices
        const bankDone = {};   // uid -> answered flag

        function bankNodeOf(q) {
            return knowledgeNodes.find(n => n.id === q.node);
        }

        function bankCardHtml(q, uid) {
            bankIndex[uid] = q;
            const node = bankNodeOf(q);
            const chips = `
                <div class="bank-chips">
                    <span class="tracker-tag tracker-tag-${BANK_LV_CLS[q.level]}">${q.level}</span>
                    <span class="bank-chip">${BANK_TYPE_LABEL[q.type]}</span>
                    <span class="bank-chip">${node.code}｜${node.name}</span>
                    <span class="bank-chip bank-chip-perf">學習表現：${q.perf}</span>
                </div>
            `;
            if (q.type === 'short') {
                return `
                    <div class="quiz-card" style="margin-bottom: 1.25rem;" id="bank-card-${uid}">
                        ${chips}
                        <div class="quiz-title">${q.q}</div>
                        ${handwriteBox('手寫作答區（可打字或切換手寫板作答）', uid)}
                        <div class="quiz-btns">
                            <span></span>
                            <button class="quiz-btn quiz-btn-primary" onclick="bankReveal('${uid}')">對照參考答案</button>
                        </div>
                        <div class="quiz-feedback-box" id="bank-fb-${uid}"></div>
                    </div>
                `;
            }
            let optsHtml = '';
            q.opts.forEach((o, i) => {
                optsHtml += `
                    <div class="quiz-opt-item" id="bank-opt-${uid}-${i}" onclick="bankSelect('${uid}', ${i})">
                        <div class="${q.type === 'multi' ? 'bank-checkbox' : 'quiz-radio-dot'}"></div>
                        <div>${o.t}</div>
                    </div>
                `;
            });
            const hint = q.type === 'multi' ? '<div class="bank-hint">（多選題：應選出所有正確的選項）</div>' : '';
            return `
                <div class="quiz-card" style="margin-bottom: 1.25rem;" id="bank-card-${uid}">
                    ${chips}
                    <div class="quiz-title">${q.q}</div>
                    ${hint}
                    <div class="quiz-options-list">${optsHtml}</div>
                    <div class="quiz-btns">
                        <span></span>
                        <button class="quiz-btn quiz-btn-primary" id="bank-submit-${uid}" onclick="bankSubmit('${uid}')">送出回答</button>
                    </div>
                    <div class="quiz-feedback-box" id="bank-fb-${uid}"></div>
                </div>
            `;
        }

        function bankSelect(uid, idx) {
            if (bankDone[uid]) return;
            const q = bankIndex[uid];
            if (!bankSel[uid]) bankSel[uid] = new Set();
            const sel = bankSel[uid];
            if (q.type === 'multi') {
                sel.has(idx) ? sel.delete(idx) : sel.add(idx);
            } else {
                sel.clear();
                sel.add(idx);
            }
            q.opts.forEach((o, i) => {
                const el = document.getElementById(`bank-opt-${uid}-${i}`);
                if (el) el.classList.toggle('selected', sel.has(i));
            });
        }

        function bankSubmit(uid) {
            const q = bankIndex[uid];
            const sel = bankSel[uid];
            if (!sel || sel.size === 0) {
                alert('請先選擇選項！');
                return;
            }
            bankDone[uid] = true;
            const correctSet = new Set(q.opts.map((o, i) => o.c ? i : -1).filter(i => i >= 0));
            const isCorrect = sel.size === correctSet.size && [...sel].every(i => correctSet.has(i));

            q.opts.forEach((o, i) => {
                const el = document.getElementById(`bank-opt-${uid}-${i}`);
                if (!el) return;
                el.classList.remove('selected');
                if (o.c) {
                    el.classList.add('correct');
                } else if (sel.has(i)) {
                    el.classList.add('incorrect');
                }
            });
            const submitBtn = document.getElementById(`bank-submit-${uid}`);
            if (submitBtn) submitBtn.style.display = 'none';

            let whyHtml = '<ul class="bank-why-list">';
            q.opts.forEach(o => {
                const label = o.t.split(' ')[0];
                whyHtml += `<li><strong>${o.c ? '✔' : '✘'} ${label}</strong>：${o.why}</li>`;
            });
            whyHtml += '</ul>';

            const fb = document.getElementById(`bank-fb-${uid}`);
            fb.style.display = 'block';
            fb.className = 'quiz-feedback-box ' + (isCorrect ? 'correct-fb' : 'incorrect-fb');
            fb.innerHTML = `<strong>${isCorrect ? '答對了！🎉' : '再想想！❌'}</strong> ${q.exp || ''}<div style="margin-top:0.4rem; font-weight:700;">逐選項解析：</div>${whyHtml}`;
            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise();
            }
        }

        function toggleCERGuide() {
            const body = document.getElementById('cer-guide-body');
            const chev = document.getElementById('cer-guide-chev');
            const isOpening = body.style.maxHeight === '0px' || body.style.maxHeight === '';
            
            if (isOpening) {
                body.style.maxHeight = body.scrollHeight + 'px';
                chev.textContent = '收起指南 ✖';
            } else {
                body.style.maxHeight = '0px';
                chev.textContent = '展開學習 ➔';
            }
        }

        function bankReveal(uid) {
            const q = bankIndex[uid];
            bankDone[uid] = true;
            const fb = document.getElementById(`bank-fb-${uid}`);
            fb.style.display = 'block';
            fb.className = 'quiz-feedback-box correct-fb';
            
            let cerHtml = '';
            if (q.cer) {
                cerHtml = `
                    <div class="cer-box">
                        <div style="font-weight:700; color:var(--accent-orange); margin-bottom:0.4rem; display:flex; align-items:center; gap:0.3rem;">
                            <span>📝</span> CER 探究科學論證寫作示範：
                        </div>
                        <div style="font-size:0.72rem; color:var(--text-muted); margin-bottom:0.5rem;">依「觀察到的證據 → 所用的理論推理 → 主張結論」順序組織：</div>
                        <div style="font-size:0.86rem; line-height:1.6; display:flex; flex-direction:column; gap:0.4rem;">
                            <div class="cer-item cer-e" style="margin:0;">
                                <strong>證據 (Evidence)—觀察／題目給定的事實：</strong>${q.cer.e}
                            </div>
                            <div class="cer-item cer-r" style="margin:0;">
                                <strong>推理 (Reasoning)—用來判斷證據的理論：</strong>${q.cer.r}
                            </div>
                            <div class="cer-item cer-c" style="margin:0;">
                                <strong>主張 (Claim)—結論判斷：</strong>${q.cer.c}
                            </div>
                        </div>
                    </div>
                `;
            }
            
            const pts = q.pts && q.pts.length
                ? '<div style="margin-top:0.6rem; font-weight:700; font-size:0.9rem;">🎯 評分與檢核要點：</div><ul class="bank-why-list" style="margin-top:0.25rem;">' + q.pts.map(p => `<li>☑ ${p}</li>`).join('') + '</ul>'
                : '';
            
            fb.innerHTML = `
                <div style="font-size:0.92rem; line-height:1.6;">
                    <strong style="color:var(--primary-blue);">參考答案：</strong><br>${q.ans}
                </div>
                ${cerHtml}
                ${pts}
            `;
            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise();
            }
        }

        // ===== 題庫總覽（篩選）視圖 =====
        let bankFilter = { module: 'all', node: 'all', level: 'all', type: 'all' };

        function setBankFilter(key, val) {
            bankFilter[key] = val;
            if (key === 'module') bankFilter.node = 'all';
            renderBankView();
        }

        function renderBankView() {
            const main = document.getElementById('main-content');
            const nodesInScope = knowledgeNodes.filter(n => bankFilter.module === 'all' || n.module === parseInt(bankFilter.module));

            let list = questionBank.filter(q => {
                const n = bankNodeOf(q);
