        // 答案取自大考中心官方選擇題答案與非選擇題評分原則；hand:true 表示含手寫非選作答。
        const examSolutions = {
          // ===== 111 學測 =====
          '111_1-2': { ans: 'Q1：(B)　Q2：(BE)', sol: 'Q1：平均速度＝總位移÷總時間，只看起訖點位移向量，與路徑彎曲無關。<br>Q2：路徑彎曲代表速度方向改變→有加速度→合力不為零，且合力（＝加速度方向）與瞬時速度不平行。' },
          '111_3': { ans: '(B)　約 0.37 倍', sol: '<b>【已知】</b>地球與火星平均半徑比 $R_地/R_火\\approx1.86$、質量比 $M_地/M_火\\approx9.3$（火星較小、較輕）。<br><b>【求】</b>同一物體在火星表面所受重力，為在地球表面的幾倍（即 $g_火/g_地$）。<br><b>【橋接理論】</b>星球表面重力場 $g=\\dfrac{GM}{R^2}$（$G$：萬有引力常數；$M$：星球質量；$R$：星球半徑）——$g$ 與質量成正比、與半徑「平方」成反比。<br><b>【計算】</b>$\\dfrac{g_火}{g_地}=\\dfrac{M_火}{M_地}\\times\\left(\\dfrac{R_地}{R_火}\\right)^2=\\dfrac{1}{9.3}\\times(1.86)^2\\approx\\dfrac{3.46}{9.3}\\approx0.37$（用比例法，免代入 $G$）　⟹　<b>(B) 約 0.37 倍</b>。' },
          '111_4': { ans: '(DE)', sol: '影響日常天氣（大尺度空氣運動）最明顯的是「重力」與「電磁力」——空氣的重量與氣壓差本質上是重力，雲的凝結、摩擦等接觸力源自電磁力。強力、弱力僅作用於原子核尺度。' },
          '111_5': { ans: '(A)　$10^2$ m/s（即 100 m/s）', sol: '<b>【已知】</b>球體質量 $m=720$ kg；動能 $E_k=3600$ <u>千</u>焦耳 $=3.6\\times10^6$ J（注意單位是「千焦耳」kJ，須乘 $10^3$）。<br><b>【求】</b>球體速率 $v$。<br><b>【橋接理論】</b>動能公式 $E_k=\\dfrac{1}{2}mv^2$，反解 $v=\\sqrt{\\dfrac{2E_k}{m}}$。<br><b>【計算】</b>$v=\\sqrt{\\dfrac{2\\times3.6\\times10^6}{720}}=\\sqrt{10^4}=100$ m/s $=10^2$ m/s　⟹　<b>(A)</b>。<br><span style="color:var(--accent-rose);">易錯：把「千焦耳」當成焦耳，會少算 $10^3$（$\\sqrt{10}\\approx3.16$ 是錯的）。</span>' },
          '111_6': { ans: '(BE)', sol: '晶片卡靠電磁感應供電：讀卡機線圈電流 $I_1$ 變動 → 卡片線圈穿過線圈的磁場變化 → 感應出 $I_2$。由楞次定律反推，欲得指定方向的 $I_2$，$I_1$ 須「正向漸減」或「反向漸增」。' },
          '111_7-8': { ans: 'Q7：(D)　Q8：(BE)', sol: 'Q7：由大氣向外熱輻射曲線對照黑體輻射，找輻射強度最強波段對應的溫度。<br>Q8：溫室氣體增加使大氣吸收更多地面長波輻射，能量收支失衡→大氣內部（近地面）溫度上升。' },
          '111_9': { ans: '(B)', sol: '科學史正確配對：愛因斯坦以光子（光量子）模型解釋光電效應。（馬克士威是統合電磁理論、預測電磁波，非解釋光電效應。）' },
          '111_49-51': { ans: 'Q49：(BD)　Q50：(D)　Q51：非選（折射作圖）', hand: true, sheet: '111_51_sheet.png', cer: true, sol: 'Q49、Q50：血流訊號的週期性與都卜勒頻移判讀。<br><b>Q51（手繪）</b>官方參考答案：先畫出與介面垂直的「法線」；因波由介質A（慢）進入介質B（快），折射線在介質B中「偏離法線」（向左偏離虛線的斜直線）。<br>作圖要點：①法線垂直界面；②折射角＞入射角（偏離法線）。<div class="cer-box" style="border:none;padding:0;margin:0;"><div class="cer-item cer-e"><strong>證據 (Evidence)—觀察到的條件：</strong>波由介質 A（波速慢）進入介質 B（波速快），入射線與法線夾一銳角。</div><div class="cer-item cer-r"><strong>推理 (Reasoning)—依據的理論：</strong>波跨介質折射時頻率不變、波速改變。波由慢介質進入快介質，波速變快 → 折射角大於入射角，折射線偏離法線（定性判斷，不需司乃耳定律計算）。</div><div class="cer-item cer-c"><strong>主張 (Claim)—結論判斷：</strong>由上述證據與推理可知，法線垂直界面；折射線偏離法線，向左偏折。</div></div>' },
          '111_54': { ans: '非選　$\\Delta f_A > \\Delta f_V > \\Delta f_C$', hand: true, cer: true, sol: '官方參考答案：$\\Delta f_A > \\Delta f_V > \\Delta f_C$（符號 $\\Delta f$ 要寫完整）。<div class="cer-box" style="border:none;padding:0;margin:0;"><div class="cer-item cer-e"><strong>證據 (Evidence)—觀察到的事實：</strong>由生理知識可知，人體血流速率為動脈(A)最快、靜脈(V)次之、微血管(C)最慢。</div><div class="cer-item cer-r"><strong>推理 (Reasoning)—依據的理論：</strong>都卜勒效應：反射波的頻率偏移量 $\\Delta f$ 正比於反射體（紅血球）的移動速率，血流越快則 $\\Delta f$ 越大。</div><div class="cer-item cer-c"><strong>主張 (Claim)—結論判斷：</strong>由上述證據與推理可知，依流速大小排序，$\\Delta f_A > \\Delta f_V > \\Delta f_C$。</div></div>' },
          '111_58-60': { ans: 'Q58：(A)　Q59：(AD)　Q60：非選（計算 $M\\approx0.1$ kg）', hand: true, cer: true, sol: 'Q58：文中電壓、電阻、能量、普朗克常數皆為導出量，「質量」才是 SI 基本量。<br>Q59：靜態平衡時線圈電流與磁極方向須使電磁力與重力平衡。<br><b>Q60（計算）</b>官方參考答案：①由動態模式斜率求 $f_B=\\frac{\\Delta V}{\\Delta v}=\\frac{90-(-95)}{3.6-(-3.8)}=25$；②$F_B=f_B I=25\\times0.04=1.0$ N；③靜態平衡 $F_B=Mg$，$M=\\frac{1.0}{9.8}\\approx0.1$ kg。<div class="cer-box" style="border:none;padding:0;margin:0;"><div class="cer-item cer-e"><strong>證據 (Evidence)—題目給定的數據：</strong>動態模式中 $V$ 與 $v$ 的線性關係圖（斜率可讀取），電流 $I=0.04$ A，重力加速度 $g=9.8$ m/s²。</div><div class="cer-item cer-r"><strong>推理 (Reasoning)—依據的理論：</strong>①由圖的斜率求力常數 $f_B=\\frac{\\Delta V}{\\Delta v}=25$；②電磁力 $F_B=f_B \\cdot I=25 \\times 0.04=1.0$ N；③靜態平衡時 $F_B=Mg$（電磁力等於重力）。</div><div class="cer-item cer-c"><strong>主張 (Claim)—結論判斷：</strong>由上述證據與推理可知，$M=\\frac{F_B}{g}=\\frac{1.0}{9.8}\\approx 0.1$ kg。</div></div>' },

          '112_36': { ans: '(B)', sol: '兩相同永久磁鐵的磁極分布判斷：由磁力線由 N 出、進 S，及同極相斥、異極相吸的空間對稱性判定。' },
          '112_37-40': { ans: 'Q37：(D)　Q38：(B)　Q39：(A)　Q40：非選（列式）', hand: true, cer: true, sol: 'Q37-39：水力發電廠的發電功率、能量與參數關係，由 $P=\\eta\\rho Q g h$ 一類關係與圖表數據求解。<br><b>Q40（列式）</b>官方參考答案：(a) 每部發電機一年供電總能量 $E_1=365\\,\\varepsilon(\\mu u w)T$；(b) 一年可減少排放的 $CO_2$ 總質量 $M=c_1c_2E_1N$。<div class="cer-box" style="border:none;padding:0;margin:0;"><div class="cer-item cer-e"><strong>證據 (Evidence)—題目提供的物理量：</strong>每部發電機效率 $\\varepsilon$、流量與落差等參數（$\\mu, u, w, T$）；每度電可減排的 CO₂ 換算係數 $c_1, c_2$；發電機數量 $N$。</div><div class="cer-item cer-r"><strong>推理 (Reasoning)—依據的理論：</strong>水力發電功率 $P=\\eta \\rho Q g h$；全年總能量＝功率×時間；減碳量＝總電能×排碳係數。逐步列式而非直接代入數字。</div><div class="cer-item cer-c"><strong>主張 (Claim)—結論判斷：</strong>由上述證據與推理可知：(a) $E_1=365\\,\\varepsilon(\\mu u w)T$；(b) $M=c_1 c_2 E_1 N$。</div></div>' },
          '112_51-52': { ans: 'Q51：(AE)　Q52：非選（衰變分類）', hand: true, cer: true, sol: 'Q51：由質量數、原子序的變化判斷衰變類型——$^{238}_{92}U$ α 衰變為 $^{234}_{90}Th$（質量數 −4、原子序 −2，符合 (A)）；$^{206}_{81}Tl$ β 衰變為 $^{206}_{82}Pb$（質量數不變、原子序 +1，符合 (E)）。<br><b>Q52（非選）</b>官方參考答案：涉及<b>強作用</b>的衰變 $^{238}_{92}U\\to{}^{234}_{90}Th$（α 衰變）；涉及<b>弱作用</b>的衰變 $^{234}_{90}Th\\to{}^{234}_{91}Pa\\to{}^{234}_{92}U$（β 衰變）。<div class="cer-box" style="border:none;padding:0;margin:0;"><div class="cer-item cer-e"><strong>證據 (Evidence)—觀察到的衰變式：</strong>$^{238}_{92}U\\to{}^{234}_{90}Th$（質量數減 4、放出 α 粒子）；$^{234}_{90}Th\\to{}^{234}_{91}Pa\\to{}^{234}_{92}U$（質量數不變、原子序 +1、放出電子）。</div><div class="cer-item cer-r"><strong>推理 (Reasoning)—依據的理論：</strong>強交互作用主導核子的結合與重排（α 衰變）；弱交互作用主導改變粒子種類的過程（中子轉質子並放出電子，即 β 衰變）。</div><div class="cer-item cer-c"><strong>主張 (Claim)—結論判斷：</strong>由上述證據與推理可知，涉及強作用者為 $^{238}U\\to{}^{234}Th$；涉及弱作用者為 $^{234}Th\\to{}^{234}Pa\\to{}^{234}U$。</div></div>' },

          // ===== 113 學測 =====
          '113_19': { ans: '(ACE)', sol: '核能電廠能量轉換：核分裂（質能轉換 $E=\\Delta mc^2$）→ 熱能 → 動能（推動渦輪）→ 電能。' },
          '113_20': { ans: '(CD)', sol: '基本交互作用：重力與電磁力為長程力（作用範圍無限遠）；強力、弱力為短程力（僅原子核尺度）。' },
          '113_21': { ans: '(D)', sol: '眼球成像類似相機：光經角膜、水晶體（凸透鏡）折射，在視網膜形成倒立實像。' },
          '113_22-23': { ans: 'Q22：(CE)　Q23：(BD)', sol: '質子射束與放射線治療：不同射束的穿透深度與能量沉積特性（布拉格峰），用於盡量殺癌細胞、保留正常組織。' },
          '113_24-25': { ans: 'Q24：(AC)　Q25：(C)', sol: 'Q24：電冰箱利用電能作功把箱內熱能搬到箱外（熱不會自發由低溫流向高溫）；密閉房間開冰箱門長時間運轉，室溫反而上升。<br>Q25：性能係數＝轉移熱能÷輸入功＝2.5，輸入 1 度電（$3.6\\times10^6$ J）可轉移 $2.5\\times3.6\\times10^6=9.0\\times10^6$ J。' },
          '113_26-27': { ans: 'Q26：(C)　Q27：(B)', sol: 'Q26：安全氣囊充氣壓力—時間圖判讀，達飽和壓力一半所需時間。<br>Q27：緩衝的物理原理——延長碰撞作用時間使加速度與受力降低（$a=\\Delta v/\\Delta t$、$F=ma$）。' },
          '113_31': { ans: '(C)　40 秒', sol: '<b>【已知】</b>P 波速率 $v_P=5$ km/s、S 波速率 $v_S=3$ km/s；此測站 P 波比 S 波早到 20 秒；預警通知在地震發生後 10 秒送達市民。<br><b>【求】</b>市民在 S 波到達前可應變的秒數。<br><b>【橋接理論】</b>地震波在均勻介質中等速前進（$t=d/v$）。先用 P、S 到達時間差求震源距 $d$，再算 S 波到達時刻，扣掉收到預警的時刻。<br><b>【計算】</b>①時間差：$\\dfrac{d}{v_S}-\\dfrac{d}{v_P}=\\dfrac{d}{3}-\\dfrac{d}{5}=\\dfrac{2d}{15}=20\\Rightarrow d=150$ km。<br>②S 波到達時刻 $=\\dfrac{d}{v_S}=\\dfrac{150}{3}=50$ 秒。<br>③應變時間 $=$ S 波到達(50 s) $-$ 收到預警(10 s) $=40$ 秒　⟹　<b>(C)</b>。' },
          '113_44-46': { ans: 'Q44：(E)　Q45：(BD)　Q46：非選（手繪 $I$-$t$ 曲線）', hand: true, sheet: '113_46_sheet.png', cer: true, sol: 'Q44、Q45：磁鐵等速穿過線圈的應電流方向、大小與影響因素（楞次定律、穿過線圈的磁場變化率）。<br><b>Q46（手繪）</b>官方參考答案：(a) 6~12 秒磁鐵移離，穿過線圈的磁場減少，與移進時相反 → 產生逆時針感應電流、電流值為正；因等速，9 秒時 N 極恰脫離環圈甲中心，且 6~12 秒曲線與 0~6 秒曲線對稱於「(6 秒, 0)」點（點對稱）。(b) 以楞次定律＋等速說明電流為正與曲線對稱性。<div class="cer-box" style="border:none;padding:0;margin:0;"><div class="cer-item cer-e"><strong>證據 (Evidence)—觀察到的情境：</strong>磁鐵以等速移離環圈甲（6~12 秒），N 極在 9 秒時恰脫離環圈中心；0~6 秒磁鐵以等速移入。</div><div class="cer-item cer-r"><strong>推理 (Reasoning)—依據的理論：</strong>法拉第定律：感應電動勢正比於穿過線圈的磁場變化率。冷次定律：移離時穿過線圈的磁場減少，感應電流方向為阻止減少（與移入時相反）。等速 → 對稱的穿過線圈的磁場變化 → 曲線與 (6s, 0) 點對稱。</div><div class="cer-item cer-c"><strong>主張 (Claim)—結論判斷：</strong>由上述證據與推理可知，6~12 秒電流為正（逆時針），曲線與 0~6 秒對稱於 (6 秒, 0) 點。</div></div>' },
          '113_54-56': { ans: 'Q54：(CD)　Q55：(C)　Q56：非選（紅外線／平流層／臭氧）', hand: true, cer: true, sol: 'Q54、Q55：天文電磁波觀測、望遠鏡口徑越大繞射越小、解析度越高。<br><b>Q56（非選）</b>官方參考答案：(a-1) 地表向外輻射主要為<b>紅外線</b>；(a-2) 吸收紫外線的臭氧主要在<b>平流層</b>；(b) 來自太空的紫外線會「被大氣中的臭氧吸收」。<div class="cer-box" style="border:none;padding:0;margin:0;"><div class="cer-item cer-e"><strong>證據 (Evidence)—觀察到的事實：</strong>地表向外輻射的峰值波長落在紅外線波段；紫外線在平流層就被大量吸收，幾乎無法到達地面。</div><div class="cer-item cer-r"><strong>推理 (Reasoning)—依據的理論：</strong>黑體輻射：地表溫度約 288 K 對應的輻射峰值在紅外線（維恩位移定律）；臭氧的分子結構可共振吸收紫外線，臭氧主要分布於平流層。</div><div class="cer-item cer-c"><strong>主張 (Claim)—結論判斷：</strong>由上述證據與推理可知：(a-1) 地表輻射主要為紅外線；(a-2) 臭氧主要在平流層；(b) 太空紫外線被大氣臭氧吸收。</div></div>' },

          // ===== 114 學測 =====
          '114_11': { ans: '(BCD)', sol: '屬於電磁波者：無線電波、紅外線、可見光、紫外線、X 射線等皆是；微中子、聲波不是電磁波。' },
          '114_19': { ans: '(DE)', sol: 'ISS 週期 90 分＜同步衛星 24 小時，由 $T^2\\propto r^3$ 知 ISS 軌道半徑較小；軌道越低速率越快（定性），該處重力場（加速度）$g=GM/r^2$ 隨 $r$ 減小而增大 → ISS 速率、加速度較大。含衛星質量的力學能／位能因質量未知，無法斷定。' },
          '114_20-21': { ans: 'Q20：(B)　Q21：(A)', sol: 'Q20：耗電 $E=Pt$ 全轉為熱，由熔化熱 $Q=mL$ 求可融化的冰量。<br>Q21：$E$ 全轉為力學能，由 $W=mgh$ 求可將多少水抬升至玉山山頂。單位換算（度→焦耳）是關鍵。' },
          '114_22-23': { ans: 'Q22：(C)　Q23：(AD)', sol: 'Q22：太空船飛行距離÷時間求平均速率（並與光速比較）。<br>Q23：太空船遠離時，地面測得電磁波頻率下降（都卜勒紅移）。' },
          '114_24': { ans: '(D)', sol: '原子能階敘述：電子只能處於分立能階，躍遷時吸收/放出的光子能量等於能階差；能階間不可停留。' },
          '114_25': { ans: '(D)', sol: '電子雙狹縫干涉圖樣與光類似，證實電子具波動性（物質波）；即使一顆一顆發射，長時間累積仍出現條紋。' },
          '114_26': { ans: '(B)', sol: '接觸力（地板支撐力等）本質是原子間的電磁交互作用；強力僅作用於原子核尺度，不涵蓋整個原子。' },
          '114_27': { ans: '(D)', sol: '手機無線充電：充電器線圈的變化磁場使手機線圈穿過線圈的磁場改變而感應電流（法拉第電磁感應），與悠遊卡同模型。' },
          '114_47-48': { ans: 'Q47：(AE)　Q48：(C)　$300/290$', sol: '<b>Q47</b>：細胞膜平衡電壓式中，$eE$（電荷×電壓）與 $\\kappa T$ 皆為能量單位（應選 2 項）。<br><b>Q48（計算）</b><br>　<b>【已知】</b>兩情況溫度為攝氏 $27^\\circ$C 與 $17^\\circ$C，且 $n_內$、$n_外$ 維持恆定。<br>　<b>【求】</b>$27^\\circ$C 時的平衡電壓量值，約為 $17^\\circ$C 時的幾倍。<br>　<b>【橋接理論】</b>平衡電壓式中的 $T$ 為「絕對溫度」，$n$ 不變時平衡電壓正比於 $T$。先把攝氏換成克氏：$27^\\circ$C$=300$ K、$17^\\circ$C$=290$ K。<br>　<b>【計算】</b>比值 $=\\dfrac{300}{290}$　⟹　<b>(C)</b>。' },
          '114_50-51': { ans: 'Q50：(BE)　Q51：非選（計算 $\\lambda\\approx390$ nm）', hand: true, cer: true, sol: 'Q50：光觸媒電子躍過能隙產生催化，需光子能量≥能隙。<br><b>Q51（計算）</b>官方參考答案：(a) $\\lambda_{max}=\\frac{hc}{E}=\\frac{6.63\\times10^{-34}\\times3.0\\times10^8}{3.2\\times1.6\\times10^{-19}}\\approx390$ nm；(b) 摻雜鋅離子後可用 400 nm（較長波長）啟動，由 $E\\propto1/\\lambda$ 知能隙「＜」3.2 eV。<div class="cer-box" style="border:none;padding:0;margin:0;"><div class="cer-item cer-e"><strong>證據 (Evidence)—題目給定的數據：</strong>二氧化鈦能隙 $E=3.2$ eV；$h=6.63\\times10^{-34}$ J·s，$c=3.0\\times10^8$ m/s，$1$ eV $=1.6\\times10^{-19}$ J；摻鋅後可用 400 nm 啟動。</div><div class="cer-item cer-r"><strong>推理 (Reasoning)—依據的理論：</strong>光子能量與波長公式 $E=\\frac{hc}{\\lambda}$，反解得 $\\lambda_{max}=\\frac{hc}{E}$。代入得 $\\lambda\\approx390$ nm。摻鋅後啟動波長變長（400 nm），由 $E\\propto1/\\lambda$ 知能隙變小。</div><div class="cer-item cer-c"><strong>主張 (Claim)—結論判斷：</strong>由上述證據與推理可知：(a) $\\lambda_{max}\\approx390$ nm；(b) 摻鋅後能隙＜3.2 eV。</div></div>' },

          // ===== 115 學測 =====
          '115_1': { ans: '(C)　約 1 秒', sol: '<b>【已知】</b>陽光從太陽到地球約需 500 秒（即「1 天文單位」的光行時間 ≈ 500 秒）；月球與地球距離約 0.0025 天文單位。<br><b>【求】</b>無線電訊號從月球傳到地球約需幾秒。<br><b>【橋接理論】</b>無線電波與可見光同為電磁波，真空中速率皆為 $c$；速率固定時，「時間與距離成正比」。<br><b>【計算】</b>$t\\approx0.0025\\times500\\text{ 秒}=1.25$ 秒 ≈ 1 秒　⟹　<b>(C)</b>。' },
          '115_3': { ans: '(D)', sol: '大氣窗：大氣對可見光與無線電波較透明（可地面觀測），紅外線、X 射線多被吸收（需上太空）。' },
          '115_8': { ans: '(BD)', sol: 'P 波（6 km/s）、S 波（3 km/s）、海嘯波（12 km/分）等速前進，由波速與距離推算抵達時間。' },
          '115_10': { ans: '(C)', sol: '汽車先等加速、再等速、後等減速；由 $v-t$ 圖斜率求加速度、圖線面積求位移；加速段與減速段位移由三角形面積比較。' },
          '115_11-12': { ans: 'Q11：(DE)　Q12：(BE)', sol: 'Q11：起重機三階段（加速/等速/減速）合力方向判斷——先由運動狀態定加速度方向再定合力。<br>Q12：三段的重力位能變化與動能變化比較（力學能觀點）。' },
          '115_13': { ans: '(E)', sol: '恆星與行星繞共同圓心公轉：甲時刻恆星朝地球接近 → 都卜勒藍移，測得頻率 $f$ 高於靜止頻率 $f_0$；乙時刻恆星遠離地球 → 都卜勒紅移，$f$ 低於 $f_0$。因此 $f$ 隨時間呈「高於 $f_0$ ↔ 低於 $f_0$」週期性變化的波形圖（(E)），而非單調或無週期變化——此為系外行星「徑向速度法」偵測原理。' },
          '115_14': { ans: '(C)', sol: '氦核內四種力量值比較：兩質子間靜電斥力（甲）與強力（丁）在核尺度均遠大於重力（乙）；一般 丁＞甲，且電磁力＞重力。依核尺度四力強度排序判定。' },
          '115_15': { ans: '(B)', sol: '電場＝單位電荷所受力，SI 單位為 N/C（牛頓每庫侖），等價於 V/m。' },
          '115_16': { ans: '(B)', sol: '氫原子中電子受質子的庫侖引力，$F\\propto1/x^2$（平方反比），方向指向原點；隨距離增大急遽減弱。' },
          '115_17': { ans: '(E)　$394/140$', sol: '<b>【已知】</b>月球赤道處日間、夜間的溫度（題目給定，換算為絕對溫標後為日間約 394 K、夜間約 140 K）。<br><b>【求】</b>相同氣體分子的平均動能，日間為夜間的幾倍。<br><b>【橋接理論】</b>理想氣體分子平均動能正比於「絕對溫度（克氏溫標）」：$\\bar{E}_k\\propto T(\\text{K})$，故動能比＝絕對溫度比。<br><b>【計算】</b>$\\dfrac{\\bar{E}_{k,日}}{\\bar{E}_{k,夜}}=\\dfrac{T_日}{T_夜}=\\dfrac{394}{140}$　⟹　<b>(E)</b>。<br><span style="color:var(--accent-rose);">關鍵：必須用「絕對溫標 K」相除，不可直接用攝氏溫度相除。</span>' },
          '115_18': { ans: '(E)', sol: '鈾核分裂 $U\\to Kr+Ba+$ 中子，反應前後質量數與電荷數守恆；釋放能量來自質量虧損 $E=\\Delta mc^2$。' },
          '115_47-49': { ans: 'Q47：(B)　Q48：(AD)　Q49：非選（手繪電場與折射線）', hand: true, sheet: '115_49_sheet.png', cer: true, sol: 'Q47：汞原子 365 nm（3.4 eV）對應的能階躍遷配對。<br>Q48：13.5 nm 極紫外光的光子能量表達與數量級（$E=hc/\\lambda$）。<br><b>Q49（手繪）</b>參考答案：(a) 依干涉加強，$3R$ 的電場與位置圖須與 $2R$ 同相（波峰對波峰）疊加使反射最大；(b) 光由慢介質射向快介質，折射線需「偏離法線」（折射角＞入射角）。<div class="cer-box" style="border:none;padding:0;margin:0;"><div class="cer-item cer-e"><strong>證據 (Evidence)—題目給定的條件：</strong>(a) $3R$ 層需使反射率最大（干涉加強）；(b) 光由速率慢的介質射入速率快的介質。</div><div class="cer-item cer-r"><strong>推理 (Reasoning)—依據的理論：</strong>(a) 薄膜干涉加強：$3R$ 的反射電場須與 $2R$ 同相疊加（波峰對波峰），故電場圖須同相。(b) 波由慢介質射入快介質，波速變快 → 折射角大於入射角，折射線偏離法線（定性判斷）。</div><div class="cer-item cer-c"><strong>主張 (Claim)—結論判斷：</strong>由上述證據與推理可知：(a) $3R$ 電場與 $2R$ 同相；(b) 折射線偏離法線。</div></div>' },
          '115_53': { ans: '非選（手繪應電流波形）', hand: true, sheet: '115_53_sheet.png', cer: true, sol: '本題以手帶動磁鐵相對線圈運動模擬潮汐發電。<div class="cer-box" style="border:none;padding:0;margin:0;"><div class="cer-item cer-e"><strong>證據 (Evidence)—觀察到的情境：</strong>手帶動磁鐵相對線圈做往復運動，磁鐵時而靠近、時而遠離線圈，且速率時大時小。</div><div class="cer-item cer-r"><strong>推理 (Reasoning)—依據的理論：</strong>法拉第電磁感應：感應電動勢正比於穿過線圈的磁場變化率；楞次定律：感應電流方向恆阻礙穿過線圈的磁場變化。磁鐵靠近與遠離時穿過線圈的磁場變化方向相反，且速率最大處變化率最大。</div><div class="cer-item cer-c"><strong>主張 (Claim)—結論判斷：</strong>由上述證據與推理可知，線圈產生方向交替、量值隨速率變化的感應電流（往復交流），速率最大處電流量值最大。</div></div>' },
          // ===== 111 參考卷 =====
          '111參_19': { ans: '(ACD)', sol: '鉛直上拋於重力（等加速度）作用下：上升與下降對稱，最高點速度為零但加速度仍為 $g$ 向下；同高度處速率相等。' },
          '111參_20': { ans: '(A)', sol: '肉品切面的彩虹光澤是薄層結構造成的光「干涉」現象（類似油膜、CD 表面），非色素造成。' },
          '111參_22': { ans: '(AD)', sol: '電磁爐靠變化磁場在鍋底感應渦電流生熱。增加交流電流、增加線圈匝數可加強磁場變化 → 加速加熱；直流或非鐵磁鍋則無法有效感應。' },
          '111參_23': { ans: '(BDE)', sol: '光電效應顯示光的粒子性：頻率低於底限頻率再強也打不出電子；頻率夠高則瞬時逸出。（愛因斯坦是「提出理論解釋」而非首先做實驗。）' },
          '111參_24': { ans: '(B)', sol: '聲波由空氣進入水中：跨介質「頻率不變」；水中聲速較大，波長變長；行進方向依折射而改變。' },
          '111參_25': { ans: '(C)', sol: '基本力判斷：中子單獨不穩定會因「弱力」衰變成質子＋電子；火星受太陽「萬有引力」繞行。（核子束縛靠強力，非電磁力。）' },
          '111參_26': { ans: '(ABE)', sol: '長直導線電流變化 → 導線環穿過線圈的磁場變化 → 感應電流。$I$ 定值時無感應（$i=0$）；$I$ 增大與減小時感應電流方向相反（楞次定律）。' },
          '111參_27': { ans: '(C)', sol: '雷擊使牆壁窗紙變黑卻屋體完好，屬「靜電放電」的尖端與表面放電熱效應現象。' },
          '111參_37': { ans: '(B)', sol: 'SI 基本物理量為電流（安培）；速度是導出量。' },
          '111參_38': { ans: '(AE)', sol: '加速度、與導出量相關者為導出物理量；溫度屬基本量。' },
          '111參_39': { ans: '非選　$\\text{kg}=\\dfrac{[h]\\cdot\\text{s}}{\\text{m}^2}$', hand: true, cer: true, sol: '官方參考答案：以普朗克常數表示公斤。<div class="cer-box" style="border:none;padding:0;margin:0;"><div class="cer-item cer-e"><strong>證據 (Evidence)—題目給定的事實：</strong>普朗克常數的單位為 $[h]=\\text{J}\\cdot\\text{s}=\\text{kg}\\cdot\\text{m}^2\\cdot\\text{s}^{-1}$。</div><div class="cer-item cer-r"><strong>推理 (Reasoning)—依據的方法（因次分析）：</strong>將 $[h]=\\text{kg}\\cdot\\text{m}^2\\cdot\\text{s}^{-1}$ 對 kg 反解，兩側除以 $\\text{m}^2\\text{s}^{-1}$；驗證因次 $(\\text{kg}\\cdot\\text{m}^2\\cdot\\text{s}^{-1})(\\text{s})(\\text{m}^{-2})=\\text{kg}$。</div><div class="cer-item cer-c"><strong>主張 (Claim)—結論：</strong>$\\text{kg}=[h]\\cdot\\text{s}\\cdot\\text{m}^{-2}$（即 $[h]\\,\\text{s}/\\text{m}^2$）。</div></div>' },
          '111參_52': { ans: '非選　$T\\approx1.7$ 小時（約 100 分鐘）', hand: true, cer: true, sol: '官方參考答案（計算）：由克卜勒第三定律 $T^2\\propto r^3$。同步衛星週期 24 小時、軌道半徑約 42400 km；繞極衛星半徑 $=6400+800=7200$ km。$T=24\\times\\left(\\frac{7200}{42400}\\right)^{3/2}\\approx24\\times0.070\\approx1.7$ 小時。<div class="cer-box" style="border:none;padding:0;margin:0;"><div class="cer-item cer-e"><strong>證據 (Evidence)—題目給定的數據：</strong>同步衛星週期 $T_s=24$ 小時、軌道半徑 $r_s\\approx42400$ km；地球半徑 $R=6400$ km；繞極衛星軌道高度 800 km。</div><div class="cer-item cer-r"><strong>推理 (Reasoning)—依據的理論：</strong>克卜勒第三定律 $T^2\\propto r^3$。繞極衛星軌道半徑 $r=R+800=7200$ km。列比例式：$\\frac{T}{T_s}=\\left(\\frac{r}{r_s}\\right)^{3/2}=\\left(\\frac{7200}{42400}\\right)^{3/2}\\approx0.070$。</div><div class="cer-item cer-c"><strong>主張 (Claim)—結論判斷：</strong>由上述證據與推理可知，$T\\approx24\\times0.070\\approx1.7$ 小時（約 100 分鐘）。</div></div>' },

          // ===== 106 學測（99 課綱）=====
          '106_14': { ans: '(E)', sol: '折射、干涉、繞射、反射、都卜勒效應皆為波動現象，聲波（機械波）全都會發生。' },
          '106_15': { ans: '(D)', sol: '光是電磁波，帶有隨時間變化的電場與磁場；微波波長比可見光長；β 射線是電子流，非電磁波。' },
          '106_16-17': { ans: 'Q16：(C)　Q17：(B)', sol: 'Q16：克服重力的能量＝功率-時間圖的面積（三角形）$=\\frac12\\times30\\times300=4500$ J。<br>Q17：$4500=mgh=50\\times10\\times h$ → $h=9$ m，每層 3 m → 爬了 3 層。' },
          '106_28': { ans: '(BC)', sol: '基本交互作用：靜電力作用範圍（無限遠）大於弱力（極短程）；有質量者間必有重力（含核內質子）。' },
          '106_29': { ans: '(ABE)', sol: '長直導線電流 $I$ 變化使導線環穿過線圈的磁場變化而生感應電流；$I$ 定值時無感應，增/減時方向相反（楞次定律）。' },
          '106_30': { ans: '(ABE)', sol: '光的波粒二象性：頻率越高光量子能量越大（$E=hf$）；光同時具波動性（干涉繞射）與粒子性（光電效應）。' },
          '106_32': { ans: '(CE)', sol: '拉塞福金箔散射：少數 α 粒子大角度反彈，推知原子質量與正電集中於極小的原子核，原子內部大部分是空的。' },
          '106_55-57': { ans: 'Q55：(D)　Q56：(E)　Q57：(C)', sol: '克卜勒等面積定律：地球與太陽連線每秒掃過的「面積」相等（不變）；但掃過的「角度」在近日點較大；由節氣時距可推地球公轉速率與遠近變化。' },
          '106_60-61': { ans: 'Q60：(CE)　Q61：(A)', sol: 'Q60：圖 11 是 $a$-$t$ 圖（非 $v$-$t$ 圖！）——$a=0$ 的區間只代表「維持前一段結束時的速度」，不代表靜止。$0\\sim20$ s：$a=+0.5\\text{ m/s}^2$，車由靜止加速到 $v=0.5\\times20=10\\text{ m/s}$（非等速，(A) 錯）。$20\\sim60$ s：$a=0$，車以 $10\\text{ m/s}$ 等速前進（非靜止，(B) 錯、(C) 對）。$60\\sim85$ s：$a=-0.4\\text{ m/s}^2$，車減速，$\\Delta v=0.4\\times25=10\\text{ m/s}$ 恰使 $t=85$ s 時 $v=0$（全程 $v\\ge0$ 未反向，(D) 錯、(E) 對）。<br>Q61：先由 $a$-$t$ 圖還原 $v$-$t$ 圖，距離＝$v$-$t$ 圖面積：$0\\sim20$ s 三角形 $\\frac{1}{2}\\times20\\times10=100$ m；$20\\sim60$ s 矩形 $10\\times40=400$ m；$60\\sim85$ s 三角形 $\\frac{1}{2}\\times25\\times10=125$ m；總計 $100+400+125=625$ m ⟹ (A)。' },

          // ===== 107 學測（99 課綱）=====
          '107_14': { ans: '(A)', sol: '水波槽圓形波：每秒 3 次 → 頻率 3 Hz；5 秒內波前移 30 cm（放大 2 倍→實際 15 cm）→ 波速與波長由 $v=f\\lambda$ 求得。' },
          '107_15': { ans: '(E)', sol: '基本力正確敘述：原子核中中子與質子間、中子與中子間都有「強力」作用（強力不分核子種類）。' },
          '107_16': { ans: '(E)', sol: '小球受空氣阻力落下：先加速、加速度漸減，最終達終端速度（$v-t$ 圖趨於水平線）。' },
          '107_17': { ans: '(A)', sol: '兩相對而立的載流圓線圈，於圓心連線中點的磁場方向由各線圈電流方向（右手定則）疊加判定。' },
          '107_18': { ans: '(C)', sol: '證實光粒子性的關鍵：存在底限頻率、光電子最大動能只與頻率有關（與強度無關）、瞬時逸出——皆波動說無法解釋。' },
          '107_29-30': { ans: 'Q29：(BC)　Q30：(BE)', sol: '電磁感應題組：甲迴路電流變化 → 乙迴路（檢流計）感應電流；將乙迴路等速拉離時穿過線圈的磁場變化，產生感應電流並使磁針偏轉。' },
          '107_31': { ans: '(AC)', sol: '光經不透光擋板後在牆上的亮度分布：幾何直進造成陰影，邊緣因繞射使明暗界線不完全銳利。' },
          '107_37': { ans: '(E)', sol: '硼能吸收熱中子，降低核反應中可引發連鎖分裂的中子數，抑制反應爐核反應。' },
          '107_39': { ans: '(A)', sol: '核融合需高溫使氘、氚原子核具足夠高動能，克服兩核間的庫侖排斥力而融合。' },
          '107_55-56': { ans: 'Q55：(D)　Q56：(C)', sol: '智慧手機測 $g$：靜止時內部加速度計讀值對應重力；自由落體（放手後）時讀值近乎為零（失重），由 $v-t$／讀值圖判定自由落體時段。' },
          '107_60': { ans: '(A)', sol: '衛星在 720 km 高圓軌道週期約 100 分鐘；引力維持衛星繞行，由克卜勒第三定律 $T^2\\propto r^3$，軌道越高週期越長、速率越慢（定性）。' },

          // ===== 108 學測（99 課綱）=====
          '108_4': { ans: '(B)', sol: '波浪向岸傳播，水淺處波速變慢 → 波前偏折（折射），使波前逐漸與海岸線平行。' },
          '108_5': { ans: '(D)', sol: '防靜電工作服導電性較高，可將累積的靜電荷導走、抑制靜電放電，降低引燃危害。' },
          '108_6': { ans: '(E)', sol: '電磁感應需「穿過線圈的磁場變化」。以「直流」通小線圈且維持定值時磁場不變 → 大線圈無感應電流。' },
          '108_7': { ans: '(D)', sol: '氫、氦、汞的發射光譜為不連續線光譜，可作為辨識原子種類的指紋（能階量子化）。' },
          '108_21': { ans: '(AD)', sol: '密閉氦氣置入沸水加熱：體積固定，溫度升高使分子平均動能增大、撞壁更頻繁 → 壓力上升。' },
          '108_22': { ans: '(BCE)', sol: '基本力：強力克服質子間靜電斥力形成原子核；摩擦力、正向力源自電磁力（非重力）。' },
          '108_23': { ans: '(CE)', sol: '國樂音階與頻率對應：音調高低由頻率決定，由頻率比判斷音程關係。' },
          '108_35': { ans: '(B)', sol: '物理學史配對：發現「月亮繞地與地表自由落體是同一種力」者為牛頓（萬有引力）。' },
          '108_39': { ans: '(D)　$10^{5}$ 倍', sol: '<b>【已知】</b>兩實心鐵球半徑分別為 $100.0$ nm $=1\\times10^{-7}$ m 與 $1.0$ cm $=1\\times10^{-2}$ m；題幹已明示「體積變小時，$n/N$ 隨之增大」。<br><b>【求】</b>小球（100 nm）的 $n/N$ 值，是大球（1.0 cm）的幾倍。<br><b>【橋接理論】</b>表面原子數 $n$ 正比於表面積 $\\propto R^2$，內部原子數 $N$ 正比於體積 $\\propto R^3$，故 $n/N\\propto R^2/R^3=1/R$（與半徑成「反比」——半徑越小，$n/N$ 越大，符合題幹敘述）。<br><b>【計算】</b>$\\dfrac{(n/N)_{小}}{(n/N)_{大}}=\\dfrac{R_{大}}{R_{小}}=\\dfrac{10^{-2}}{10^{-7}}=10^{5}$　⟹　<b>(D) $10^5$ 倍</b>。<br><span style="color:var(--accent-rose);">易錯：$n/N$ 是「反比」於半徑，不是正比——把它當正比會得到相反的 $10^{-5}$。也不是總原子數之比（那會是 $R^3$ 比 $=10^{15}$，不在選項中）。</span>' },
          '108_51': { ans: '(A)　16 倍', sol: '<b>【已知】</b>同步衛星週期 $T_{同}=24$ 小時；新衛星週期 $T_{新}=3$ 小時；兩衛星質量相同、軌道皆為圓形。<br><b>【求】</b>新衛星所受重力，約為同步衛星的幾倍。<br><b>【橋接理論】</b>①由克卜勒第三定律 $T^2\\propto r^3$ 求半徑比；②重力 $F=\\dfrac{GMm}{r^2}\\propto\\dfrac{1}{r^2}$（質量 $m$ 相同）。<br><b>【計算】</b>①$\\dfrac{r_{新}}{r_{同}}=\\left(\\dfrac{T_{新}}{T_{同}}\\right)^{2/3}=\\left(\\dfrac{3}{24}\\right)^{2/3}=\\left(\\dfrac{1}{8}\\right)^{2/3}=\\dfrac{1}{4}$。<br>②$\\dfrac{F_{新}}{F_{同}}=\\left(\\dfrac{r_{同}}{r_{新}}\\right)^2=4^2=16$　⟹　<b>(A)</b>。' },
          '108_53': { ans: '(D)　約 1000 倍', sol: '<b>【已知】</b>光碟面微結構尺寸約數百奈米（$\\sim2\\times10^{-7}$ m）；氫原子直徑約 $10^{-10}$ m（$0.1$ nm）。<br><b>【求】</b>光碟微結構尺寸約為氫原子直徑的幾倍。<br><b>【橋接理論】</b>同單位下兩尺度相除，取數量級估算。<br><b>【計算】</b>$\\dfrac{2\\times10^{-7}\\text{ m}}{1\\times10^{-10}\\text{ m}}\\approx2\\times10^{3}$，數量級約 $10^3$　⟹　<b>(D) 約 1000 倍</b>。' },
          '108_54-56': { ans: 'Q54：(C)　Q55：(B)　Q56：(A)', sol: 'Q54：水力發電將水的「重力位能」轉換為電能。<br>Q55：由水位—蓄水量表推水面面積（$\\Delta V/\\Delta h$）。<br>Q56：最大功率 $P=\\eta\\rho Q g h$，代入流量、25% 效率與落差計算。' },

          // ===== 109 學測（99 課綱）=====
          '109_1': { ans: '(E)', sol: '原子結構探究史依時間排序（如：電子→原子核→夸克等發現先後）。' },
          '109_2': { ans: '(B)', sol: '熱氣球以 5 m/s 等速上升，相機離手瞬間具向上初速 5 m/s，之後為自由落體（僅受重力）。' },
          '109_3': { ans: '(B)', sol: '克卜勒等面積定律：行星在近日點速率快、遠日點慢；速度沿軌道切線方向，量值近日點最大。' },
          '109_4': { ans: '(B)', sol: '三點電荷共線，左端電荷所受合力為其餘兩電荷庫侖力的向量和，由電量正負與距離平方反比比較大小。' },
          '109_5': { ans: '(B)', sol: '可變電阻改變電流 → 螺線管磁場改變（電流磁效應）；磁場變化影響懸掛磁棒受力，判斷偏移。' },
          '109_19-20': { ans: 'Q19：(C)　Q20：(D)', sol: '海嘯波等速前進，由走時（時間-距離）圖判讀抵達時間；並由圖推知波速、波長等特性。' },
          '109_24': { ans: '(CE)', sol: '量子現象：電子雙狹縫干涉源自波動性（非粒子性）；氫原子發射光譜為不連續線光譜（能階量子化）。' },

        function toggleExamItem(btn) {
            const item = btn.closest('.exam-item');
            const body = item.querySelector('.exam-body');
            const isOpening = !item.classList.contains('open');
            
            // Close other open exam items
            document.querySelectorAll('.exam-item.open').forEach(openItem => {
                if (openItem !== item) {
                    openItem.classList.remove('open');
                    openItem.querySelector('.exam-body').style.maxHeight = '0px';
                }
            });
            
            if (isOpening) {
                item.classList.add('open');
                body.style.maxHeight = body.scrollHeight + 'px';
                
                // 自動初始化展開題目的 Canvas 繪圖板
                const canvases = body.querySelectorAll('.draw-canvas');
                canvases.forEach(canvas => {
                    const uid = canvas.getAttribute('id').replace('canvas-', '');
                    const sheet = canvas.getAttribute('data-sheet');
                    setTimeout(() => {
                        initCanvas(uid, sheet);
                        body.style.maxHeight = body.scrollHeight + 'px';
                    }, 100); // 延長到 100ms 確保過渡動畫開始並有 clientWidth
                });
            } else {
                item.classList.remove('open');
                body.style.maxHeight = '0px';
            }
        }

        // ===== 歷屆試題選擇題作答邏輯與狀態 =====
        const examMCSel = {};

        function parseExamAnswers(ansStr) {
            const results = [];
            let str = (ansStr || '').trim();
            
            // 匹配子題 (如 Q1：(B)、Q22：(CE)、Q51：非選)
            const subMatches = [...str.matchAll(/(Q\d+|第\s*\d+[-~、]\s*\d+\s*題|第\s*\d+\s*題|Q\d+參)\s*[：:]\s*(非選|\([A-E]+\))/g)];
            if (subMatches.length > 0) {
                subMatches.forEach(m => {
                    const label = m[1];
                    const ansVal = m[2];
                    if (ansVal.startsWith('(')) {
                        const letters = ansVal.replace(/[\(\)]/g, '').split('');
                        results.push({ label, isMC: true, ans: letters });
                    } else {
                        results.push({ label, isMC: false, ans: [] });
                    }
                });
            } else {
                // 單一題目，匹配 (B) 或 (DE)
                const mcMatch = str.match(/^\s*\(([A-E]+)\)/);
                if (mcMatch) {
                    const letters = mcMatch[1].split('');
                    results.push({ label: '', isMC: true, ans: letters });
                } else {
                    results.push({ label: '', isMC: false, ans: [] });
                }
            }
            return results;
        }

        function toggleExamMC(btn, key, qIdx, opt) {
            const item = btn.closest('.exam-item');
            const solBox = item.querySelector('.exam-sol');
            if (solBox && !solBox.hasAttribute('hidden')) return; // 已公布答案時禁止更改
            
            if (!examMCSel[key]) examMCSel[key] = {};
            if (!examMCSel[key][qIdx]) examMCSel[key][qIdx] = new Set();
            
            const sel = examMCSel[key][qIdx];
            if (sel.has(opt)) {
                sel.delete(opt);
                btn.classList.remove('selected');
            } else {
                sel.add(opt);
                btn.classList.add('selected');
            }
        }

        function checkExamMC(key, itemEl) {
            const s = examSolutions[key];
            if (!s) return;
            const mcQuestions = parseExamAnswers(s.ans);
            const selections = examMCSel[key] || {};
            
            mcQuestions.forEach((q, qIdx) => {
                if (!q.isMC) return;
                
                const sel = selections[qIdx] || new Set();
                const correctSet = new Set(q.ans);
                const isCorrect = sel.size === correctSet.size && [...sel].every(opt => correctSet.has(opt));
                
                const row = itemEl.querySelector(`#exam-mc-row-${key}-${qIdx}`);
                if (row) {
                    ['A', 'B', 'C', 'D', 'E'].forEach(opt => {
                        const optBtn = row.querySelector(`[data-opt="${opt}"]`);
                        if (optBtn) {
                            optBtn.classList.remove('selected');
                            if (correctSet.has(opt)) {
                                optBtn.classList.add('correct');
                            } else if (sel.has(opt)) {
                                optBtn.classList.add('incorrect');
                            }
                        }
                    });
                    
                    const resultText = row.querySelector(`#exam-mc-result-${key}-${qIdx}`);
                    if (resultText) {
                        resultText.style.display = 'inline-block';
                        if (isCorrect) {
                            resultText.style.color = 'var(--accent-green)';
                            resultText.innerHTML = '🎉 答對了！';
                        } else {
                            resultText.style.color = 'var(--accent-rose)';
                            resultText.innerHTML = `❌ 答錯（正確答案：${q.ans.join('')}）`;
                        }
                    }
                }
            });
        }

        function resetExamMC(key, itemEl) {
            const s = examSolutions[key];
            if (!s) return;
            const mcQuestions = parseExamAnswers(s.ans);
            
            if (examMCSel[key]) {
                mcQuestions.forEach((q, qIdx) => {
                    if (examMCSel[key][qIdx]) examMCSel[key][qIdx].clear();
                });
            }
            
            mcQuestions.forEach((q, qIdx) => {
                if (!q.isMC) return;
                const row = itemEl.querySelector(`#exam-mc-row-${key}-${qIdx}`);
                if (row) {
                    ['A', 'B', 'C', 'D', 'E'].forEach(opt => {
                        const optBtn = row.querySelector(`[data-opt="${opt}"]`);
                        if (optBtn) optBtn.classList.remove('correct', 'incorrect', 'selected');
                    });
                    const resultText = row.querySelector(`#exam-mc-result-${key}-${qIdx}`);
                    if (resultText) {
                        resultText.style.display = 'none';
                        resultText.textContent = '';
                    }
                }
            });
        }

        // 升級版手寫與繪圖作答區（支援 canvas 手繪與答題紙底圖）

                    <div class="canvas-toolbar">
                        <button class="canvas-tool-btn active" data-tool="pen" onclick="setCanvasTool('${uid}', 'pen')">✏️ 畫筆</button>
                        <button class="canvas-tool-btn" data-tool="eraser" onclick="setCanvasTool('${uid}', 'eraser')">🧽 橡皮擦</button>
                        <button class="canvas-tool-btn clear-btn" onclick="clearCanvas('${uid}')">🗑️ 重畫</button>
                    </div>
                    <div class="canvas-container">
                        <canvas id="canvas-${uid}" class="draw-canvas" data-sheet="${sheetFile}" ${style}></canvas>
                    </div>
                </div>
            </div>`;
        }

        // 歷屆題的「答案與詳解」區塊（非選附手寫作答區與 CER 結構，選擇題附作答按鈕）
        function examSolBlock(e) {
            const key = e.year + '_' + e.q;
            const s = examSolutions[key];
            if (!s) return '';
            const sheetFile = s.sheet || '';
            const hand = s.hand ? handwriteBox(sheetFile ? '答題卷作答區（請直接在底圖格線上作答／手繪）' : '非選作答區（可打字或手寫）', key, sheetFile) : '';
            
            // 解析選擇題子題
            const mcQuestions = parseExamAnswers(s.ans);
            let mcHtml = '';
            let hasMC = false;
            
            mcQuestions.forEach((q, qIdx) => {
                if (q.isMC) {
                    hasMC = true;
                    let optionsButtons = '';
                    ['A', 'B', 'C', 'D', 'E'].forEach(opt => {
                        optionsButtons += `
                            <button class="exam-opt-btn" data-opt="${opt}" onclick="toggleExamMC(this, '${key}', ${qIdx}, '${opt}')">${opt}</button>
                        `;
                    });
                    
                    const qTitle = q.label ? `${q.label}作答：` : '選擇題作答：';
                    mcHtml += `
                        <div class="exam-mc-row" id="exam-mc-row-${key}-${qIdx}">
                            <span class="exam-mc-qtitle">${qTitle}</span>
                            <div class="exam-mc-options">${optionsButtons}</div>
                            <span class="exam-mc-result" id="exam-mc-result-${key}-${qIdx}" style="display:none; font-weight:700; margin-left:0.5rem; font-size:0.88rem;"></span>
                        </div>
                    `;
                }
            });
            
            let mcSection = '';
            if (hasMC) {
                mcSection = `
                    <div class="exam-mc-section">
                        <div class="handwrite-label" style="margin-bottom:0.4rem; color:var(--primary-blue); font-size:0.88rem;">✏️ 選擇題作答區（點選作答，點「顯示答案與詳解」時自動核對）</div>
                        ${mcHtml}
                    </div>
                `;
            }
            
            // 如果是手繪題，動態在答案區最上方渲染官方手繪滿分答案圖
            const ansImg = sheetFile ? `
                <div style="margin: 0.5rem 0.9rem 0.75rem 0.9rem; padding-bottom: 0.75rem; border-bottom: 1px dashed var(--border-color);">
                    <div style="font-weight:700; color:#047857; font-size:0.85rem; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.25rem;">
                        <span>🎯</span> 官方答題卷手繪滿分答案示範：
                    </div>
                    <img class="exam-crop ${invertCrops ? 'inverted' : ''}" src="assets/exam_crops/${sheetFile.replace('_sheet.png', '_ans.png')}" style="max-width:100%; border:1px solid var(--border-color); border-radius:6px;" alt="手繪題官方答案圖">
                </div>
            ` : '';
 
            return `
                ${hand}
                ${mcSection}
                <div class="exam-sol-wrap">
                    <button class="exam-sol-btn" onclick="toggleExamSol(this, '${key}')">📖 顯示答案與詳解</button>
                    <div class="exam-sol" hidden>
                        <div class="exam-ans">✅ 答案：${s.ans}</div>
                        ${ansImg}
                        <div class="exam-detail">${s.sol}</div>
                        ${s.cer ? '<div class="cer-note">＊上方以 <b>CER</b>（主張 Claim／證據 Evidence／推理 Reasoning）結構作答，為非選說明題的建議寫法。</div>' : ''}
                    </div>
                </div>`;
        }

        function resizeExamBody(el) {
            const body = el.closest('.exam-body');
            const item = el.closest('.exam-item');
            if (body && item && item.classList.contains('open')) {
                body.style.maxHeight = body.scrollHeight + 'px';
            }
        }

        // ===== 全域 Canvas 繪圖板控制邏輯 =====
        const canvasStates = {};

        function initCanvas(uid, sheetFile) {
            const canvas = document.getElementById(`canvas-${uid}`);
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            
            // 若此畫布尚未註冊狀態，進行註冊
            if (!canvasStates[uid]) {
                canvasStates[uid] = {
                    canvas: canvas,
                    ctx: ctx,
                    isDrawing: false,
                    tool: 'pen',
                    lastX: 0,
                    lastY: 0,
                    sheetFile: sheetFile
                };
                
                // 綁定事件（僅綁定一次）
                canvas.addEventListener('mousedown', (e) => startDrawing(e, uid));
                canvas.addEventListener('mousemove', (e) => draw(e, uid));
                canvas.addEventListener('mouseup', () => stopDrawing(uid));
                canvas.addEventListener('mouseout', () => stopDrawing(uid));
                
                // 觸控事件相容
                canvas.addEventListener('touchstart', (e) => {
                    const touch = e.touches[0];
                    const mouseEvent = new MouseEvent('mousedown', {
                        clientX: touch.clientX,
                        clientY: touch.clientY
                    });
                    canvas.dispatchEvent(mouseEvent);
                    e.preventDefault();
                }, { passive: false });
                
                canvas.addEventListener('touchmove', (e) => {
                    const touch = e.touches[0];
                    const mouseEvent = new MouseEvent('mousemove', {
                        clientX: touch.clientX,
                        clientY: touch.clientY
                    });
                    canvas.dispatchEvent(mouseEvent);
                    e.preventDefault();
                }, { passive: false });
                
                canvas.addEventListener('touchend', () => {
                    const mouseEvent = new MouseEvent('mouseup', {});
                    canvas.dispatchEvent(mouseEvent);
                });
                
                // 監聽視窗大小改變，自動調整 canvas 比例
                window.addEventListener('resize', () => resizeCanvas(uid));
            }
            
            // 每次展開時重新 resize 確保寬高尺寸正確
            resizeCanvas(uid);
        }

        function resizeCanvas(uid) {
            const state = canvasStates[uid];
            if (!state) return;
            const canvas = state.canvas;
            const ctx = state.ctx;
            
            const container = canvas.parentElement;
            const width = container.clientWidth || 500;
            
            // 決定高寬比例
            let ratio = 2.5; // 預設 2.5:1
            if (state.sheetFile) {
                if (state.sheetFile.includes('115_49')) ratio = 3.27; // width 490 / height 150
                else if (state.sheetFile.includes('115_53')) ratio = 2.0;  // width 490 / height 245
                else if (state.sheetFile.includes('113_46')) ratio = 2.58; // width 490 / height 190 (now unclipped bottom)
                else if (state.sheetFile.includes('111_51')) ratio = 3.77; // width 490 / height 130
            }
            
            const height = width / ratio;
            
            // 備份現有內容以免 resize 後筆跡被清空
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            if (canvas.width > 0 && canvas.height > 0) {
                tempCtx.drawImage(canvas, 0, 0);
            }
            
            const dpr = window.devicePixelRatio || 1;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            
            ctx.scale(dpr, dpr);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // 恢復畫筆與橡皮擦狀態
            if (state.tool === 'pen') {
                ctx.strokeStyle = '#1d4ed8'; // 大考常用原子筆藍色
                ctx.lineWidth = 2.5;
                ctx.globalCompositeOperation = 'source-over';
            } else {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 15;
                ctx.globalCompositeOperation = 'destination-out';
            }
            
            // 貼回舊筆跡
            if (tempCanvas.width > 0 && tempCanvas.height > 0) {
                ctx.drawImage(tempCanvas, 0, 0, tempCanvas.width / dpr, tempCanvas.height / dpr, 0, 0, width, height);
            }
        }

        function startDrawing(e, uid) {
            const state = canvasStates[uid];
            if (!state) return;
            state.isDrawing = true;
            
            const rect = state.canvas.getBoundingClientRect();
            state.lastX = e.clientX - rect.left;
            state.lastY = e.clientY - rect.top;
        }

        function draw(e, uid) {
            const state = canvasStates[uid];
            if (!state || !state.isDrawing) return;
            
            const rect = state.canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const ctx = state.ctx;
            ctx.beginPath();
            ctx.moveTo(state.lastX, state.lastY);
            ctx.lineTo(x, y);
            
            if (state.tool === 'pen') {
                ctx.strokeStyle = '#1d4ed8'; // 大考原子筆藍色
                ctx.lineWidth = 2.5;
                ctx.globalCompositeOperation = 'source-over';
            } else {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 15;
                ctx.globalCompositeOperation = 'destination-out';
            }
            ctx.stroke();
            
            state.lastX = x;
            state.lastY = y;
        }

        function stopDrawing(uid) {
            const state = canvasStates[uid];
            if (state) state.isDrawing = false;
        }

        function setCanvasTool(uid, tool) {
            const state = canvasStates[uid];
            if (!state) return;
            state.tool = tool;
            
            const wrap = document.getElementById(`board-wrap-${uid}`);
            if (wrap) {
                wrap.querySelectorAll('.canvas-tool-btn').forEach(btn => {
                    if (btn.getAttribute('data-tool') === tool) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }
        }

        function clearCanvas(uid) {
            const state = canvasStates[uid];
            if (!state) return;
            state.ctx.clearRect(0, 0, state.canvas.width, state.canvas.height);
        }

        function toggleWritingMode(uid) {
            const textEl = document.getElementById(`handwrite-text-${uid}`);
            const boardEl = document.getElementById(`board-wrap-${uid}`);
            const toggleBtn = document.getElementById(`toggle-mode-btn-${uid}`);
            
            if (textEl.style.display === 'none') {
                textEl.style.display = 'block';
                boardEl.style.display = 'none';
                toggleBtn.textContent = '✍️ 切換手寫板';
                resizeExamBody(toggleBtn);
            } else {
                textEl.style.display = 'none';
                boardEl.style.display = 'block';
                toggleBtn.textContent = '⌨️ 切換打字框';
                setTimeout(() => {
                    initCanvas(uid, '');
                    resizeExamBody(toggleBtn);
                }, 50);
            }
        }

        function toggleExamSol(btn, key) {
            const item = btn.closest('.exam-item');
            const box = btn.parentElement.querySelector('.exam-sol');
            if (box.hasAttribute('hidden')) {
                box.removeAttribute('hidden');
                btn.textContent = '📖 收合答案與詳解';
                
                // 核對選擇題答案
                checkExamMC(key, item);
                
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise([box]).then(() => resizeExamBody(btn));
                }
            } else {
                box.setAttribute('hidden', '');
                btn.textContent = '📖 顯示答案與詳解';
                
                // 重設選擇題答案以重新練習
                resetExamMC(key, item);
            }
            resizeExamBody(btn);
        }

        function setExamYear(y) {
            examYearFilter = y;
            renderExamsView();
        }

        function setShow99(v) {
            show99 = v;
            // 若關閉 99 課綱時正停在 99 課綱的篩選，退回全部
            if (!show99 && examYearFilter !== 'all' && examPapers[examYearFilter] && examPapers[examYearFilter].cur === '99') {
                examYearFilter = 'all';
            }
            if (currentView === 'stats') renderStatsView();
            else renderExamsView();
        }

        function toggleInvertCrops(v) {
            invertCrops = v;
            document.querySelectorAll('.exam-crop').forEach(img => {
                img.classList.toggle('inverted', invertCrops);
            });
        }

        // 從命題矩陣點某節點 → 跳到歷屆試題並篩選該節點
        function showExamsForNode(nodeId) {
            examNodeFilter = nodeId;
            examYearFilter = 'all';
            // 若該節點只有 99 課綱的題，自動開啟 99 課綱以免空白
            const cnt = nodeExamCounts(nodeId);
            if (cnt.c108 === 0 && cnt.c99 > 0) show99 = true;
            document.querySelectorAll('.nav-item').forEach(el => {
                const oc = el.getAttribute('onclick') || '';
                el.classList.toggle('active', oc.includes("'tool-exams'"));
            });
            renderExamsView();
            window.scrollTo(0, 0);
        }
        function clearExamNode() {
            examNodeFilter = 'all';
            renderExamsView();
        }


        // Initialize sidebar (26 節點導航) and land on the first node
        window.addEventListener('load', () => {
            buildNodeSidebar();
            const firstNode = document.querySelector('.nav-item-node');
            if (firstNode) firstNode.classList.add('active');
            renderNodeView('N01');
        });

    </script>
</body>
</html>
